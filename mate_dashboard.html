<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PUZZMI - 메이트 대시보드</title>
  <link rel="stylesheet" href="styles.css"/>
  <link rel="stylesheet" href="pages.css"/>
  <link rel="stylesheet" href="pages-theme.css"/>
  <link rel="stylesheet" href="nav.css"/>
  <script type="module" src="nav.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    body.bg-cream { background: var(--bg-cream); background-repeat: no-repeat; background-size: cover; min-height: 100vh; position: relative; overflow-x: hidden; }
    .decorative-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
    .decorative-element { position: absolute; border-radius: 50%; filter: blur(60px); opacity: 0.25; animation: float 10s ease-in-out infinite; }
    .decorative-element:nth-child(1) { width: 250px; height: 250px; background: linear-gradient(45deg, #667eea, #764ba2); top: 15%; left: -5%; animation-delay: 0s; }
    .decorative-element:nth-child(2) { width: 200px; height: 200px; background: linear-gradient(45deg, #f093fb, #f5576c); top: 50%; right: -8%; animation-delay: 3s; }
    .decorative-element:nth-child(3) { width: 180px; height: 180px; background: linear-gradient(45deg, #4facfe, #00f2fe); bottom: 20%; left: 10%; animation-delay: 6s; }
    @keyframes float { 0%, 100% { transform: translateY(0px) rotate(0deg); } 33% { transform: translateY(-25px) rotate(120deg); } 66% { transform: translateY(15px) rotate(240deg); } }
    
    .dashboard-wrap { max-width: 1200px; margin: 40px auto; padding: 0 20px; position: relative; z-index: 1; }
    
    .page-header { background: linear-gradient(135deg, rgba(255,255,255,0.98) 0%, rgba(255,255,255,0.92) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.4); border-radius: 28px; padding: 40px; margin-bottom: 32px; box-shadow: 0 24px 60px rgba(0,0,0,0.08); position: relative; overflow: hidden; text-align: center; }
    .page-header::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 5px; background: linear-gradient(90deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #f5576c 75%, #4facfe 100%); animation: shimmer 3s ease-in-out infinite; }
    @keyframes shimmer { 0%, 100% { opacity: 1; } 50% { opacity: 0.8; } }
    .page-header h2 { font-size: 2.5rem; font-weight: 800; background: linear-gradient(135deg, #667eea 0%, #764ba2 30%, #f093fb 70%, #f5576c 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0 0 16px 0; position: relative; }
    .page-header h2::after { content: ''; position: absolute; bottom: -12px; left: 50%; transform: translateX(-50%); width: 80px; height: 4px; background: linear-gradient(90deg, #667eea 0%, #f093fb 100%); border-radius: 2px; }
    .page-subtitle { color: var(--text-secondary); font-size: 1.1rem; margin: 0; font-weight: 500; }
    
    .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; margin-bottom: 32px; }
    
    .calendar-section { background: linear-gradient(135deg, rgba(255,255,255,0.98) 0%, rgba(255,255,255,0.92) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.4); border-radius: 24px; padding: 32px; box-shadow: 0 16px 40px rgba(0,0,0,0.06); position: relative; overflow: hidden; }
    .calendar-section::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, #667eea 0%, #764ba2 33%, #f093fb 66%, #f5576c 100%); opacity: 0.8; }
    .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 16px;}
    .calendar-title { font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }
    
    /* 휴무일 설정 버튼 */
    .calendar-actions-wrap { display: flex; gap: 16px; align-items: center; }
    .btn-edit-mode { background: #e2e8f0; color: #475569; padding: 10px 16px; border-radius: 12px; border: none; cursor: pointer; font-weight: 700; font-size: 0.9rem; transition: all 0.3s; display: flex; align-items: center; gap: 8px; }
    .btn-edit-mode:hover { background: #cbd5e1; }
    .btn-edit-mode.active { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); color: white; box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3); animation: pulseRed 2s infinite; }
    @keyframes pulseRed { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }

    .calendar-nav { display: flex; gap: 12px; align-items: center; }
    .calendar-nav-btn { width: 40px; height: 40px; border: 2px solid rgba(102, 126, 234, 0.2); border-radius: 12px; background: linear-gradient(135deg, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.7) 100%); cursor: pointer; transition: all 0.3s; font-size: 1.2rem; font-weight: bold; color: var(--text-primary); }
    .calendar-nav-btn:hover { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; transform: scale(1.1); box-shadow: 0 6px 16px rgba(102, 126, 234, 0.3); }
    .current-month { font-size: 1.2rem; font-weight: 700; color: var(--text-primary); min-width: 120px; text-align: center; }
    
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; background: rgba(102, 126, 234, 0.1); border-radius: 12px; padding: 2px; margin-bottom: 20px; transition: all 0.3s; }
    .calendar-day-header { background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.05) 100%); padding: 12px 8px; text-align: center; font-weight: 700; font-size: 0.9rem; border-radius: 8px; }
    .calendar-day { background: rgba(255,255,255,0.9); padding: 12px 8px; text-align: center; cursor: pointer; transition: all 0.2s; border-radius: 8px; position: relative; min-height: 60px; display: flex; flex-direction: column; align-items: center; gap: 4px; border: 2px solid transparent; }
    .calendar-day:hover { background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.05) 100%); transform: scale(1.05); z-index: 2; box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2); }
    .calendar-day.today { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; font-weight: 700; box-shadow: 0 6px 16px rgba(102, 126, 234, 0.4); }
    .calendar-day.selected { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; font-weight: 700; box-shadow: 0 6px 16px rgba(240, 147, 251, 0.4); transform: scale(1.1); z-index: 3;}
    .calendar-day.other-month { opacity: 0.3; pointer-events: none; }
    
    /* 휴무일 스타일 */
    .calendar-day.unavailable { background: repeating-linear-gradient(45deg, rgba(220,53,69,0.05), rgba(220,53,69,0.05) 10px, rgba(220,53,69,0.1) 10px, rgba(220,53,69,0.1) 20px); color: #94a3b8; border-color: rgba(220,53,69,0.2); opacity: 0.8;}
    .calendar-day.unavailable::after { content: '휴무'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-15deg); font-size: 1.2rem; font-weight: 900; color: rgba(220,53,69,0.7); pointer-events: none; letter-spacing: 2px; text-shadow: 1px 1px 0px #fff;}
    
    /* 편집 모드일 때 캘린더 스타일 */
    .calendar-grid.edit-mode { border: 2px dashed #ef4444; background: rgba(239, 68, 68, 0.05); }
    .calendar-grid.edit-mode .calendar-day:not(.other-month) { cursor: cell; }
    .calendar-grid.edit-mode .calendar-day:hover { background: rgba(239, 68, 68, 0.15); border-color: #ef4444; }

    .booking-dots { display: flex; gap: 2px; flex-wrap: wrap; justify-content: center; max-width: 100%; z-index: 1;}
    .booking-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .booking-dot.pending { background: #ffc107; box-shadow: 0 0 4px rgba(255, 193, 7, 0.6); }
    .booking-dot.confirmed { background: #28a745; box-shadow: 0 0 4px rgba(40, 167, 69, 0.6); }
    .booking-dot.completed { background: #007bff; box-shadow: 0 0 4px rgba(0, 123, 255, 0.6); }
    .booking-dot.cancelled { background: #dc3545; box-shadow: 0 0 4px rgba(220, 53, 69, 0.6); }
    .booking-count { font-size: 0.7rem; font-weight: 700; color: var(--text-secondary); margin-top: 2px; }
    .calendar-day.today .booking-count, .calendar-day.selected .booking-count { color: rgba(255,255,255,0.9); }
    
    .calendar-legend { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; padding: 16px; background: rgba(102, 126, 234, 0.05); border-radius: 12px; border: 1px solid rgba(102, 126, 234, 0.1); }
    .legend-item { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; font-weight: 600; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

    /* 통계 및 나머지 기존 CSS 유지 (생략 없이 원본 유지) */
    .stats-section { background: linear-gradient(135deg, rgba(255,255,255,0.98) 0%, rgba(255,255,255,0.92) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.4); border-radius: 24px; padding: 32px; box-shadow: 0 16px 40px rgba(0,0,0,0.06); position: relative; overflow: hidden; }
    .stats-section::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, #f093fb 0%, #f5576c 33%, #4facfe 66%, #00f2fe 100%); opacity: 0.8; }
    .stats-title { font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0 0 24px 0; text-align: center; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 16px; }
    .stat-card { background: linear-gradient(135deg, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.7) 100%); border: 2px solid rgba(255,255,255,0.4); border-radius: 16px; padding: 20px; text-align: center; transition: all 0.3s; box-shadow: 0 8px 20px rgba(0,0,0,0.06); }
    .stat-card:hover { transform: translateY(-4px) scale(1.05); box-shadow: 0 12px 28px rgba(0,0,0,0.12); border-color: rgba(102, 126, 234, 0.3); }
    .stat-number { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
    .stat-label { font-size: 0.9rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
    
    .bookings-section { background: linear-gradient(135deg, rgba(255,255,255,0.98) 0%, rgba(255,255,255,0.92) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.4); border-radius: 24px; padding: 32px; box-shadow: 0 16px 40px rgba(0,0,0,0.06); position: relative; overflow: hidden; }
    .bookings-section::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, #4facfe 0%, #00f2fe 33%, #667eea 66%, #764ba2 100%); opacity: 0.8; }
    .section-title { font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, #4facfe 0%, #00f2fe 50%, #667eea 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0 0 24px 0; display: flex; align-items: center; gap: 12px; }
    .section-title::before { content: ''; width: 4px; height: 28px; background: linear-gradient(135deg, #4facfe 0%, #667eea 100%); border-radius: 2px; flex-shrink: 0; }
    
    .toolbar { background: rgba(102, 126, 234, 0.08); border: 2px solid rgba(102, 126, 234, 0.15); border-radius: 20px; padding: 24px; margin-bottom: 24px; box-shadow: 0 8px 24px rgba(102, 126, 234, 0.1); }
    .toolbar-row { display: grid; grid-template-columns: 2fr 2fr 1fr; gap: 20px; align-items: center; margin-bottom: 20px; }
    .search-group { position: relative; display: flex; align-items: center; }
    .search-input { width: 100%; padding: 14px 20px; border: 2px solid rgba(102, 126, 234, 0.2); border-radius: 16px; font-size: 1rem; transition: all 0.3s; }
    .search-input:focus { outline: none; border-color: rgba(102, 126, 234, 0.5); box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1); }
    .search-clear { position: absolute; right: 12px; background: none; border: none; cursor: pointer; color: var(--text-secondary); font-size: 14px; width: 24px; height: 24px; display: flex; justify-content: center; align-items: center; border-radius: 50%;}
    .search-clear:hover { background: rgba(102, 126, 234, 0.1); color: #667eea;}
    .filter-group { display: flex; gap: 12px; }
    .filter-select { padding: 12px 16px; border: 2px solid rgba(102, 126, 234, 0.2); border-radius: 12px; background: rgba(255,255,255,0.9); cursor: pointer; min-width: 140px; }
    .action-group { display: flex; gap: 12px; align-items: center; justify-content: flex-end; }
    .refresh-btn { width: 44px; height: 44px; border: 2px solid rgba(102, 126, 234, 0.2); border-radius: 12px; background: white; cursor: pointer; transition: all 0.3s; }
    .refresh-btn:hover { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; transform: rotate(180deg) scale(1.1); }
    .result-count { background: rgba(102, 126, 234, 0.1); color: #667eea; padding: 8px 16px; border-radius: 12px; font-weight: 700; border: 1px solid rgba(102, 126, 234, 0.2); white-space: nowrap; }
    
    .quick-filters { display: flex; gap: 8px; flex-wrap: wrap; }
    .quick-filter { padding: 8px 16px; border: 2px solid rgba(102, 126, 234, 0.2); border-radius: 20px; background: white; cursor: pointer; transition: all 0.3s; font-size: 0.85rem; font-weight: 600; }
    .quick-filter.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-color: transparent; box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3); }
    
    .booking-card { background: white; border: 1px solid rgba(102, 126, 234, 0.2); border-radius: 20px; padding: 24px; margin-bottom: 16px; transition: all 0.3s; position: relative; overflow: hidden; }
    .booking-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg, #667eea 0%, #764ba2 100%); opacity: 0.6; }
    .booking-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,0.1); border-color: rgba(102, 126, 234, 0.4); }
    .booking-header { display: flex; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 16px; }
    .booking-info h4 { font-size: 1.3rem; margin: 0 0 8px 0; }
    .booking-meta { display: flex; gap: 12px; flex-wrap: wrap; font-size: 0.95rem; color: var(--text-secondary); }
    .status-badge { padding: 6px 12px; border-radius: 16px; font-weight: 700; font-size: 0.8rem; }
    .status-pending { background: #fff3cd; color: #856404; }
    .status-confirmed { background: #d1e7dd; color: #0f5132; }
    .status-completed { background: #667eea; color: white; }
    .status-cancelled { background: #dc3545; color: white; }
    
    .booking-actions { display: flex; gap: 10px; margin-top: 16px; padding-top: 16px; border-top: 1px solid rgba(0,0,0,0.08); }
    .booking-actions .btn { flex: 1; padding: 12px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: all 0.3s; }
    .btn-accept { background: #28a745; color: white; }
    .btn-decline { background: #dc3545; color: white; }
    
    .booking-details { background: rgba(102, 126, 234, 0.05); border-radius: 12px; padding: 16px; margin: 16px 0; }
    .booking-notes { font-style: italic; color: var(--text-secondary); margin-top: 12px; padding: 12px; background: rgba(255,255,255,0.6); border-radius: 8px; border-left: 3px solid #667eea; }
    
    .empty-state { text-align: center; padding: 60px 40px; border: 2px dashed rgba(102, 126, 234, 0.2); border-radius: 20px; color: var(--text-secondary); }
    .loading { display: flex; justify-content: center; align-items: center; padding: 60px; color: var(--text-secondary); }
    .loading::before { content: ''; width: 24px; height: 24px; border: 3px solid rgba(102, 126, 234, 0.2); border-top: 3px solid #667eea; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 12px; }
    
    /* 모달 */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
    .modal-overlay.active { display: flex; }
    .modal-content { background: white; border-radius: 20px; padding: 32px; width: 90%; max-width: 500px; }
    .modal-content textarea { width: 100%; min-height: 120px; padding: 16px; border: 2px solid #e0e0e0; border-radius: 12px; margin: 20px 0; font-family: inherit; }
    .modal-actions { display: flex; gap: 12px; }
    .modal-actions .btn { flex: 1; padding: 14px; border: none; border-radius: 12px; cursor: pointer; font-weight: 700;}
    .btn-cancel-modal { background: #e0e0e0; }
    .btn-submit-decline { background: #dc3545; color: white; }

    /* 모바일 반응형 최적화 (768px 이하) */
    @media (max-width: 768px) {
      .dashboard-wrap { margin: 20px auto; padding: 0 12px; }
      
      /* 1. 페이지 헤더 축소 */
      .page-header { padding: 24px 16px; border-radius: 20px; margin-bottom: 20px; }
      .page-header h2 { font-size: 1.6rem; margin-bottom: 8px; }
      .page-subtitle { font-size: 0.9rem; }

      /* 2. 대시보드 그리드 1열로 변경 */
      .dashboard-grid { grid-template-columns: 1fr; gap: 20px; margin-bottom: 20px; }
      
      /* 3. 캘린더 섹션 최적화 */
      .calendar-section { padding: 20px 12px; border-radius: 20px; }
      .calendar-title { font-size: 1.4rem; }
      .calendar-header { flex-direction: column; align-items: flex-start; gap: 12px; }
      .calendar-actions-wrap { width: 100%; display: flex; flex-direction: column; gap: 10px; }
      .calendar-nav { width: 100%; justify-content: space-between; }
      .btn-edit-mode { width: 100%; justify-content: center; padding: 12px; }
      
      .calendar-day { min-height: 45px; padding: 4px; font-size: 0.85rem; }
      .calendar-day.unavailable::after { font-size: 0.8rem; letter-spacing: 0; }
      .booking-dot { width: 4px; height: 4px; } /* 점 크기 축소 */

      /* 4. 통계 섹션 2x2 그리드 */
      .stats-section { padding: 20px 16px; }
      .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
      .stat-card { padding: 12px; border-radius: 12px; }
      .stat-number { font-size: 1.4rem; margin-bottom: 2px; }
      .stat-label { font-size: 0.75rem; }

      /* 5. 툴바 및 필터 최적화 (상하 배치) */
      .toolbar { padding: 16px; border-radius: 16px; }
      .toolbar-row { grid-template-columns: 1fr; gap: 12px; }
      .search-input { padding: 12px 16px; font-size: 0.95rem; }
      .filter-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
      .filter-select { min-width: 0; padding: 10px; font-size: 0.85rem; }
      .action-group { justify-content: space-between; }
      
      .quick-filters { gap: 6px; overflow-x: auto; flex-wrap: nowrap; padding-bottom: 4px; }
      .quick-filters::-webkit-scrollbar { display: none; } /* 스크롤바 숨김 */
      .quick-filter { flex: 0 0 auto; padding: 6px 12px; font-size: 0.8rem; }

      /* 6. 예약 카드 컴팩트화 */
      .booking-card { padding: 16px; border-radius: 16px; }
      .booking-info h4 { font-size: 1.1rem; }
      .booking-meta { font-size: 0.85rem; gap: 8px; }
      .booking-meta span { width: 100%; } /* 모바일에서는 메타 정보 한줄씩 */
      .status-badge { padding: 4px 10px; font-size: 0.75rem; }
      
      .booking-actions { flex-direction: row; gap: 8px; } /* 버튼 나란히 */
      .booking-actions .btn { padding: 10px; font-size: 0.85rem; }
      
      /* 7. 모달창 최적화 */
      .modal-content { padding: 24px 20px; border-radius: 20px; width: 95%; }
    }
  </style>
</head>
<body class="bg-cream">
  <div class="decorative-bg">
    <div class="decorative-element"></div>
    <div class="decorative-element"></div>
    <div class="decorative-element"></div>
  </div>

  <div id="app-nav"></div>

  <div id="declineModal" class="modal-overlay">
    <div class="modal-content">
      <h3>예약 거절 사유</h3>
      <textarea id="declineReason" placeholder="거절 사유를 입력해주세요..."></textarea>
      <div class="modal-actions">
        <button class="btn btn-cancel-modal" onclick="closeDeclineModal()">취소</button>
        <button class="btn btn-submit-decline" onclick="submitDecline()">거절하기</button>
      </div>
    </div>
  </div>

  <main class="dashboard-wrap">
    <section class="page-header">
      <h2>메이트 대시보드</h2>
      <p class="page-subtitle">예약 현황과 휴무일을 한눈에 관리하세요</p>
      <div id="mateGuard" class="error" style="display:none; margin-top: 16px;"></div>
    </section>

    <div class="dashboard-grid">
      <section class="calendar-section">
        <div class="calendar-header">
          <h3 class="calendar-title">📅 일정 캘린더</h3>
          <div class="calendar-actions-wrap">
            <button id="toggleEditModeBtn" class="btn-edit-mode">
              <i class="fas fa-calendar-times"></i> 휴무일 설정
            </button>
            <div class="calendar-nav">
              <button class="calendar-nav-btn" id="prevMonth">‹</button>
              <span class="current-month" id="currentMonth">2025년 1월</span>
              <button class="calendar-nav-btn" id="nextMonth">›</button>
            </div>
          </div>
        </div>
        
        <div class="calendar-grid" id="calendarGrid">
          <div class="calendar-day-header">일</div>
          <div class="calendar-day-header">월</div>
          <div class="calendar-day-header">화</div>
          <div class="calendar-day-header">수</div>
          <div class="calendar-day-header">목</div>
          <div class="calendar-day-header">금</div>
          <div class="calendar-day-header">토</div>
        </div>
        
        <div class="calendar-legend">
          <div class="legend-item"><div class="legend-dot" style="background: #ffc107;"></div><span>대기중</span></div>
          <div class="legend-item"><div class="legend-dot" style="background: #28a745;"></div><span>확정됨</span></div>
          <div class="legend-item"><div class="legend-dot" style="background: #007bff;"></div><span>완료됨</span></div>
          <div class="legend-item"><div class="legend-dot" style="background: rgba(220,53,69,0.5);"></div><span>휴무일</span></div>
        </div>
      </section>

      <section class="stats-section">
        <h3 class="stats-title">📊 이번 달 통계</h3>
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-number" id="statTotal">0</div>
            <div class="stat-label">총 예약</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="statPending">0</div>
            <div class="stat-label">대기중</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="statConfirmed">0</div>
            <div class="stat-label">확정됨</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="statCompleted">0</div>
            <div class="stat-label">완료됨</div>
          </div>
        </div>
      </section>
    </div>

    <section class="bookings-section">
      <h3 class="section-title">📋 예약 목록</h3>
      
      <div class="toolbar">
        <div class="toolbar-row">
          <div class="search-group">
            <input class="search-input" id="searchInput" type="text" placeholder="🔍 고객명, 연락처, 요청사항으로 검색..."/>
            <button class="search-clear" id="clearSearch">✕</button>
          </div>
          <div class="filter-group">
            <select class="filter-select" id="statusFilter">
              <option value="">📊 모든 상태</option>
              <option value="pending">⏳ 대기중</option>
              <option value="confirmed">✅ 확정됨</option>
              <option value="completed">🎉 완료됨</option>
              <option value="cancelled">❌ 취소됨</option>
            </select>
            <select class="filter-select" id="sortBy">
              <option value="created_at_desc">📅 신청일 최신순</option>
              <option value="created_at_asc">📅 신청일 오래된순</option>
              <option value="date_desc">📅 예약일 최신순</option>
              <option value="date_asc">📅 예약일 오래된순</option>
              <option value="status_asc">📊 상태순</option>
            </select>
          </div>
          <div class="action-group">
            <button class="refresh-btn" id="refreshBtn">🔄</button>
            <span class="result-count" id="resultCount">총 0건</span>
          </div>
        </div>
        <div class="quick-filters">
          <button class="quick-filter active" data-filter="all">📋 전체</button>
          <button class="quick-filter" data-filter="pending">⏳ 대기중</button>
          <button class="quick-filter" data-filter="confirmed">✅ 확정됨</button>
          <button class="quick-filter" data-filter="today">📅 오늘</button>
          <button class="quick-filter" data-filter="upcoming">📅 예정</button>
        </div>
      </div>
      
      <div id="list"></div>
    </section>
  </main>

<script type="module">
  import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
  const SUPABASE_URL = "https://eevvgbbokenpjnvtmztk.supabase.co";
  // 본인의 ANON_KEY로 변경 유지
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVldnZnYmJva2VucGpudnRtenRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTc1NjI2OTgsImV4cCI6MjA3MzEzODY5OH0.aLoqYYeDW_0ZEwkr8c8IPFvXnEwQPZah1mQzwiyG2Y4";
  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const mateGuard = document.getElementById('mateGuard');
  const list = document.getElementById('list');
  const resultCount = document.getElementById('resultCount');
  
  const calendarGrid = document.getElementById('calendarGrid');
  const currentMonthEl = document.getElementById('currentMonth');
  const prevMonthBtn = document.getElementById('prevMonth');
  const nextMonthBtn = document.getElementById('nextMonth');
  const toggleEditModeBtn = document.getElementById('toggleEditModeBtn');
  
  const statTotal = document.getElementById('statTotal');
  const statPending = document.getElementById('statPending');
  const statConfirmed = document.getElementById('statConfirmed');
  const statCompleted = document.getElementById('statCompleted');
  
  const searchInput = document.getElementById('searchInput');
  const clearSearch = document.getElementById('clearSearch');
  const statusFilter = document.getElementById('statusFilter');
  const sortBy = document.getElementById('sortBy');
  const refreshBtn = document.getElementById('refreshBtn');
  const quickFilters = document.querySelectorAll('.quick-filter');

  // 인증 확인
  const { data: { user } } = await supabase.auth.getUser();
  if (!user) {
    mateGuard.textContent = "로그인이 필요합니다.";
    mateGuard.style.display = 'block';
    setTimeout(() => location.replace('auth_combo.html'), 800);
    throw new Error('login required');
  }

  // 상태 변수
  let allBookings = [];
  let filteredBookings = [];
  let unavailableDates = []; // 휴무일 목록
  let isEditMode = false;    // 휴무일 설정 모드 상태
  let currentDate = new Date();
  let selectedDate = null;

  // 1) 캘린더 렌더링
  function renderCalendar() {
    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();
    currentMonthEl.textContent = `${year}년 ${month + 1}월`;
    
    const firstDay = new Date(year, month, 1);
    const lastDay = new Date(year, month + 1, 0);
    const startDate = new Date(firstDay);
    startDate.setDate(startDate.getDate() - firstDay.getDay());
    const endDate = new Date(lastDay);
    endDate.setDate(endDate.getDate() + (6 - lastDay.getDay()));
    
    const existingDays = calendarGrid.querySelectorAll('.calendar-day');
    existingDays.forEach(day => day.remove());
    
    const bookingsByDate = {};
    allBookings.forEach(booking => {
      if (booking.date) {
        if (!bookingsByDate[booking.date]) bookingsByDate[booking.date] = [];
        bookingsByDate[booking.date].push(booking);
      }
    });
    
    const todayStr = new Date().toISOString().split('T')[0];
    
    for (let date = new Date(startDate); date <= endDate; date.setDate(date.getDate() + 1)) {
      const dateStr = date.toISOString().split('T')[0];
      const isCurrentMonth = date.getMonth() === month;
      const isToday = dateStr === todayStr;
      const isSelected = selectedDate === dateStr;
      const isUnavailable = unavailableDates.includes(dateStr); // 휴무일 여부 체크
      
      const dayBookings = bookingsByDate[dateStr] || [];
      const hasBookings = dayBookings.length > 0;
      
      const dayEl = document.createElement('div');
      dayEl.className = `calendar-day ${!isCurrentMonth ? 'other-month' : ''} ${isToday ? 'today' : ''} ${isSelected ? 'selected' : ''} ${hasBookings ? 'has-bookings' : ''} ${isUnavailable ? 'unavailable' : ''}`;
      dayEl.dataset.date = dateStr;
      
      const dayNumber = document.createElement('div');
      dayNumber.textContent = date.getDate();
      dayEl.appendChild(dayNumber);
      
      if (hasBookings && isCurrentMonth && !isUnavailable) {
        const dotsContainer = document.createElement('div');
        dotsContainer.className = 'booking-dots';
        
        const statusCounts = {};
        dayBookings.forEach(b => {
          let st = b.status === 'canceled_by_mate' || b.status === 'declined' ? 'cancelled' : b.status;
          statusCounts[st] = (statusCounts[st] || 0) + 1;
        });
        
        let dotCount = 0;
        Object.entries(statusCounts).forEach(([status, count]) => {
          for (let i = 0; i < Math.min(count, 4 - dotCount); i++) {
            if (dotCount >= 4) break;
            const dot = document.createElement('div');
            dot.className = `booking-dot ${status}`;
            dotsContainer.appendChild(dot);
            dotCount++;
          }
        });
        dayEl.appendChild(dotsContainer);
      }
      
      // 클릭 이벤트
      if (isCurrentMonth) {
        dayEl.addEventListener('click', () => {
          if (isEditMode) {
            // 휴무일 설정 모드일 때는 휴무일 토글만 수행
            toggleAvailability(dateStr, dayEl);
          } else {
            // 일반 모드일 때는 예약 내역 필터링
            document.querySelectorAll('.calendar-day.selected').forEach(el => el.classList.remove('selected'));
            dayEl.classList.add('selected');
            selectedDate = dateStr;
            filterByDate(dateStr);
            document.querySelector('.bookings-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
          }
        });
      }
      calendarGrid.appendChild(dayEl);
    }
  }

  // 2) 휴무일 토글 로직 (DB 저장/삭제)
  async function toggleAvailability(dateStr, dayEl) {
    const isCurrentlyUnavailable = unavailableDates.includes(dateStr);
    
    // 로딩 시각 효과
    dayEl.style.opacity = '0.5';

    try {
      if (isCurrentlyUnavailable) {
        // 휴무일 해제
        const { error } = await supabase
          .from('mate_unavailabilities')
          .delete()
          .eq('mate_id', user.id)
          .eq('date', dateStr);
          
        if (error) throw error;
        
        unavailableDates = unavailableDates.filter(d => d !== dateStr);
        dayEl.classList.remove('unavailable');
      } else {
        // 해당 날짜에 이미 확정/대기중인 예약이 있는지 경고
        const hasActiveBooking = allBookings.some(b => b.date === dateStr && (b.status === 'confirmed' || b.status === 'pending'));
        if (hasActiveBooking) {
          if (!confirm(`🚨 주의: ${dateStr}에 이미 대기 중이거나 확정된 예약이 있습니다.\n그래도 휴무일로 닫으시겠습니까? (기존 예약은 직접 취소해야 합니다)`)) {
            dayEl.style.opacity = '1';
            return;
          }
        }

        // 휴무일 추가
        const { error } = await supabase
          .from('mate_unavailabilities')
          .insert({ mate_id: user.id, date: dateStr });
          
        if (error) throw error;
        
        unavailableDates.push(dateStr);
        dayEl.classList.add('unavailable');
      }
    } catch (error) {
      console.error('휴무일 설정 오류:', error);
      alert('휴무일 설정 중 오류가 발생했습니다.');
    } finally {
      dayEl.style.opacity = '1';
      // 점포 표시 등을 위해 다시 렌더링
      renderCalendar(); 
    }
  }

  // 휴무일 설정 모드 ON/OFF 버튼
  toggleEditModeBtn.addEventListener('click', () => {
    isEditMode = !isEditMode;
    if (isEditMode) {
      toggleEditModeBtn.classList.add('active');
      toggleEditModeBtn.innerHTML = '<i class="fas fa-check"></i> 편집 완료';
      calendarGrid.classList.add('edit-mode');
      
      // 알림 메시지 띄우기 (toast처럼 가볍게)
      const msg = document.createElement('div');
      msg.textContent = '👆 캘린더의 날짜를 클릭하여 휴무일을 설정하거나 해제하세요!';
      msg.style.cssText = 'position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:#ef4444; color:white; padding:12px 24px; border-radius:30px; font-weight:bold; box-shadow:0 10px 25px rgba(239,68,68,0.4); z-index:9999; animation: slideUp 0.3s ease-out;';
      document.body.appendChild(msg);
      setTimeout(() => { msg.style.opacity='0'; setTimeout(()=>msg.remove(),300); }, 3000);
    } else {
      toggleEditModeBtn.classList.remove('active');
      toggleEditModeBtn.innerHTML = '<i class="fas fa-calendar-times"></i> 휴무일 설정';
      calendarGrid.classList.remove('edit-mode');
    }
  });

  // 예약 목록 필터링
  function filterByDate(dateStr) {
    quickFilters.forEach(btn => btn.classList.remove('active'));
    filteredBookings = allBookings.filter(b => b.date === dateStr);
    applyCurrentFilters();
    renderBookings();
  }

  function applyCurrentFilters() {
    const searchTerm = (searchInput?.value || '').toLowerCase();
    const statusFilterValue = statusFilter?.value || '';
    if (searchTerm) {
      filteredBookings = filteredBookings.filter(b => 
        (b.customer_name || '').toLowerCase().includes(searchTerm) || 
        (b.customer_contact || '').toLowerCase().includes(searchTerm) || 
        (b.notes || '').toLowerCase().includes(searchTerm)
      );
    }
    if (statusFilterValue) {
      filteredBookings = filteredBookings.filter(b => {
        let st = b.status === 'canceled_by_mate' || b.status === 'declined' ? 'cancelled' : b.status;
        return st === statusFilterValue;
      });
    }
  }

  function applyFilters() {
    const sortOption = sortBy?.value || 'created_at_desc';
    filteredBookings = selectedDate ? allBookings.filter(b => b.date === selectedDate) : [...allBookings];
    applyCurrentFilters();
    
    filteredBookings.sort((a, b) => {
      if(sortOption === 'created_at_asc') return new Date(a.created_at) - new Date(b.created_at);
      if(sortOption === 'created_at_desc') return new Date(b.created_at) - new Date(a.created_at);
      if(sortOption === 'date_asc') return new Date(a.date||'2099-01-01') - new Date(b.date||'2099-01-01');
      if(sortOption === 'date_desc') return new Date(b.date||'1970-01-01') - new Date(a.date||'1970-01-01');
      return 0;
    });
    renderBookings();
  }

  function renderBookings() {
    resultCount.textContent = selectedDate ? `${selectedDate} - 총 ${filteredBookings.length}건` : `총 ${filteredBookings.length}건`;
    if (!filteredBookings.length) {
      list.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">예약이 없습니다</div></div>`;
      return;
    }

    list.innerHTML = filteredBookings.map(booking => {
      const created = new Date(booking.created_at).toLocaleString('ko-KR');
      const datetime = booking.date ? `${booking.date} ${booking.start_time||''} (${booking.duration_hours||0}시간)` : '날짜 미정';
      let st = booking.status === 'canceled_by_mate' || booking.status === 'declined' ? 'cancelled' : booking.status;
      const stDisplay = st === 'pending'?'⏳ 대기중':st==='confirmed'?'✅ 확정됨':st==='completed'?'🎉 완료됨':'❌ 취소됨';

      return `
        <div class="booking-card">
          <div class="booking-header">
            <div class="booking-info">
              <h4>📅 ${datetime}</h4>
              <div class="booking-meta">
                <span>👤 ${booking.customer_name || '고객'}</span>
                <span>📞 ${booking.customer_contact || '-'}</span>
                <span>📅 신청: ${created}</span>
              </div>
            </div>
            <div class="booking-status"><span class="status-badge status-${st}">${stDisplay}</span></div>
          </div>
          ${booking.notes ? `<div class="booking-notes"><strong>💭 요청사항:</strong><br>${booking.notes.replace(/</g,'&lt;')}</div>` : ''}
          ${booking.status === 'pending' ? `
            <div class="booking-actions">
              <button class="btn btn-accept" onclick="acceptBooking(${booking.id})"><i class="fas fa-check"></i> 수락</button>
              <button class="btn btn-decline" onclick="openDeclineModal(${booking.id})"><i class="fas fa-times"></i> 거절</button>
            </div>
          ` : ''}
        </div>`;
    }).join('');
  }

  function updateStats() {
    const year = currentDate.getFullYear(), month = currentDate.getMonth();
    const thisMonth = allBookings.filter(b => b.date && new Date(b.date).getFullYear() === year && new Date(b.date).getMonth() === month);
    statTotal.textContent = thisMonth.length;
    statPending.textContent = thisMonth.filter(b => b.status === 'pending').length;
    statConfirmed.textContent = thisMonth.filter(b => b.status === 'confirmed').length;
    statCompleted.textContent = thisMonth.filter(b => b.status === 'completed').length;
  }

  // 데이터 로드
  async function load() {
    list.innerHTML = '<div class="loading">데이터를 불러오는 중...</div>';
    try {
      // 예약 데이터와 휴무일 데이터를 동시에 병렬로 불러오기
      const [bookingsRes, unavailRes] = await Promise.all([
        supabase.from('bookings').select('*').eq('mate_id', user.id).order('created_at', { ascending: false }).limit(500),
        supabase.from('mate_unavailabilities').select('date').eq('mate_id', user.id)
      ]);

      if (bookingsRes.error) throw bookingsRes.error;
      if (unavailRes.error) throw unavailRes.error;

      allBookings = bookingsRes.data || [];
      unavailableDates = (unavailRes.data || []).map(row => row.date); // 휴무일 배열 저장
      
      applyFilters();
      renderCalendar();
      updateStats();
    } catch (error) {
      console.error('로드 중 오류:', error);
      list.innerHTML = `<div class="error">❌ 로드 중 오류가 발생했습니다: ${error.message}</div>`;
    }
  }

  // 네비게이션 및 필터 이벤트
  prevMonthBtn.addEventListener('click', () => { currentDate.setMonth(currentDate.getMonth() - 1); renderCalendar(); updateStats(); });
  nextMonthBtn.addEventListener('click', () => { currentDate.setMonth(currentDate.getMonth() + 1); renderCalendar(); updateStats(); });
  refreshBtn.addEventListener('click', async () => { refreshBtn.style.transform = 'rotate(360deg)'; await load(); setTimeout(() => refreshBtn.style.transform = '', 300); });
  searchInput.addEventListener('input', () => { selectedDate = null; applyFilters(); });
  clearSearch.addEventListener('click', () => { searchInput.value = ''; selectedDate = null; applyFilters(); });
  statusFilter.addEventListener('change', () => { selectedDate = null; applyFilters(); });
  sortBy.addEventListener('change', applyFilters);

  quickFilters.forEach(btn => {
    btn.addEventListener('click', () => {
      quickFilters.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedDate = null;
      const f = btn.dataset.filter;
      const today = new Date().toISOString().split('T')[0];
      if(f==='all') filteredBookings = [...allBookings];
      else if(f==='pending') filteredBookings = allBookings.filter(b => b.status === 'pending');
      else if(f==='confirmed') filteredBookings = allBookings.filter(b => b.status === 'confirmed');
      else if(f==='today') filteredBookings = allBookings.filter(b => b.date === today);
      else if(f==='upcoming') filteredBookings = allBookings.filter(b => b.date >= today);
      applyCurrentFilters();
      renderBookings();
    });
  });

  // 예약 수락/거절 로직 유지
  let currentBookingId = null;
  window.acceptBooking = async function(id) {
    if (!confirm('이 예약을 수락하시겠습니까?')) return;
    try {
      const { error } = await supabase.from('bookings').update({ status: 'confirmed' }).eq('id', id).eq('mate_id', user.id);
      if (error) throw error; alert('수락되었습니다!'); await load();
    } catch (e) { alert('실패: ' + e.message); }
  };
  window.openDeclineModal = function(id) { currentBookingId = id; document.getElementById('declineModal').classList.add('active'); };
  window.closeDeclineModal = function() { currentBookingId = null; document.getElementById('declineModal').classList.remove('active'); };
  window.submitDecline = async function() {
    const reason = document.getElementById('declineReason').value.trim();
    if (!reason) return alert('사유를 입력해주세요.');
    try {
      const { error } = await supabase.from('bookings').update({ status: 'declined', decline_reason: reason }).eq('id', currentBookingId).eq('mate_id', user.id);
      if (error) throw error; alert('거절되었습니다.'); closeDeclineModal(); await load();
    } catch (e) { alert('실패: ' + e.message); }
  };

  await load();
</script>
</body>
