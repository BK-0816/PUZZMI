<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PUZZMI - パスワードリセット</title>
  <link rel="stylesheet" href="styles.css"/>
  <link rel="stylesheet" href="pages.css"/>
  <link rel="stylesheet" href="pages-theme.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    body.bg-cream { background: var(--bg-cream); background-repeat:no-repeat; background-size:cover; min-height: 100vh; position: relative; overflow-x: hidden; }
    .decorative-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
    .decorative-element { position: absolute; border-radius: 50%; filter: blur(60px); opacity: 0.25; animation: float 12s ease-in-out infinite; }
    .decorative-element:nth-child(1) { width: 300px; height: 300px; background: linear-gradient(45deg, #667eea, #764ba2); top: 10%; left: -5%; }
    .decorative-element:nth-child(2) { width: 250px; height: 250px; background: linear-gradient(45deg, #f093fb, #f5576c); top: 50%; right: -8%; animation-delay: 4s; }
    @keyframes float { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-20px) rotate(180deg); } }

    .signup-container { max-width: 500px; margin: 60px auto; padding: 0 20px; position: relative; z-index: 1; }
    .signup-card { background: linear-gradient(135deg, rgba(255,255,255,0.98) 0%, rgba(255,255,255,0.92) 100%); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.4); border-radius: 28px; padding: 50px; box-shadow: 0 30px 80px rgba(0,0,0,0.08); position: relative; overflow: hidden; }
    .signup-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 6px; background: linear-gradient(90deg, #667eea 0%, #764ba2 50%, #f093fb 100%); }

    .signup-header { text-align: center; margin-bottom: 32px; }
    .signup-title { font-size: 2.2rem; font-weight: 900; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 12px; }
    .signup-subtitle { color: var(--text-secondary); font-size: 1rem; line-height: 1.6; font-weight: 500; }

    .form-grid { display: grid; gap: 24px; }
    .form-label { display: block; font-weight: 700; color: var(--text-primary); margin-bottom: 8px; font-size: 0.9rem; text-transform: uppercase; }
    .form-input { width: 100%; padding: 16px 20px; border: 2px solid rgba(102, 126, 234, 0.2); border-radius: 12px; font-size: 1rem; transition: all 0.3s; box-sizing: border-box; background: rgba(255,255,255,0.9); }
    .form-input:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1); }

    .btn { width: 100%; padding: 16px; border-radius: 12px; font-weight: 800; font-size: 1rem; border: none; cursor: pointer; transition: all 0.3s; display: flex; justify-content: center; align-items: center; gap: 8px; }
    .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .msg-box { padding: 16px; border-radius: 12px; font-weight: 600; margin-top: 16px; display: none; text-align: center; font-size: 0.9rem; }
    .msg-error { background: #fadbd8; color: #922b21; border: 2px solid rgba(220, 53, 69, 0.1); display: block; }
    
    .loading { width: 18px; height: 18px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s infinite linear; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 모바일 반응형 */
    @media (max-width: 768px) {
      .signup-container { margin: 20px auto; padding: 0 12px; }
      .signup-card { padding: 32px 20px; border-radius: 24px; }
      .signup-title { font-size: 1.8rem; }
      
      /* 성공 메시지 안내 박스 최적화 */
      #successSection .info-box {
        font-size: 0.8rem !important;
        line-height: 1.5 !important;
        padding: 12px !important;
        text-align: left !important;
        -webkit-text-size-adjust: none;
      }
    }
  </style>
</head>
<body class="bg-cream">
  <div class="decorative-bg">
    <div class="decorative-element"></div>
    <div class="decorative-element"></div>
  </div>

  <main class="signup-container">
    <section class="signup-card">
      
      <div id="formSection">
        <div class="signup-header">
          <h1 class="signup-title">パスワードリセット</h1>
          <p class="signup-subtitle">登録されたメールアドレスに<br>パスワードリセット用のリンクをお送りします。</p>
        </div>

        <form class="form-grid" id="resetForm">
          <div class="form-field">
            <label class="form-label" for="email">E-MAIL</label>
            <input class="form-input" type="email" id="email" required placeholder="example@email.com"/>
          </div>

          <div id="resetResult"></div>
          
          <button type="submit" class="btn btn-primary" id="resetBtn">
            📧 リセットメールを送信
          </button>
        </form>

        <div style="text-align: center; margin-top: 32px; padding-top: 24px; border-top: 1px solid rgba(102, 126, 234, 0.2);">
          <a href="auth_combo.html" style="color: #667eea; text-decoration: none; font-weight: 600;">← ログインページに戻る</a>
        </div>
      </div>

      <div id="successSection" style="display:none; text-align:center; padding: 20px 0;">
        <div style="font-size: 5rem; margin-bottom: 20px; animation: float 3s ease-in-out infinite;">✉️</div>
        <h2 style="font-size:1.8rem; font-weight:800; color:#667eea; margin-bottom:16px;">リセットメールを送信しました！</h2>
        <p style="font-size:0.95rem; color:var(--text-secondary); line-height:1.6; margin-bottom: 30px;">
          入力されたメールアドレスに再設定用のリンクを送信しました。<br>
          <strong style="color:#333;">メールを確認し、パスワードを変更してください。</strong>
        </p>
        <div class="info-box" style="background: rgba(102,126,234,0.1); padding: 16px; border-radius: 12px; font-size: 0.9rem; color: #555; text-align: left;">
          ※ メールが届かない場合は、迷惑メールフォルダをご確認ください。<br>
          ※ リンクの有効期限は1時間です。
        </div>
      </div>

    </section>
  </main>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
    const SUPABASE_URL = "https://eevvgbbokenpjnvtmztk.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVldnZnYmJva2VucGpudnRtenRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTc1NjI2OTgsImV4cCI6MjA3MzEzODY5OH0.aLoqYYeDW_0ZEwkr8c8IPFvXnEwQPZah1mQzwiyG2Y4";
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const resetForm = document.getElementById('resetForm');
    const resetBtn = document.getElementById('resetBtn');
    const resetResult = document.getElementById('resetResult');

    resetForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      resetBtn.disabled = true;
      resetBtn.innerHTML = '<div class="loading"></div> 送信中...';
      resetResult.style.display = 'none';

      try {
        // 1. 가입된 유저인지 먼저 확인 (보안 및 편의성)
        const { data: userExists } = await supabase.from('profiles').select('id').eq('email', email).maybeSingle();
        
        if (!userExists) {
          throw new Error('このメールアドレスで登録されたアカウントが見つかりません。');
        }

        // 2. 비밀번호 재설정 메일 발송
        // Netlify 도메인 주소를 정확히 입력해야 링크가 꼬이지 않습니다.
const { data, error } = await supabase.auth.resetPasswordForEmail(email, {
  emailRedirectTo: 'https://puzzmi.netlify.app/reset_password.html'
});

        if (error) throw error;

        // 3. 성공 시 화면 전환 (signup 방식)
        document.getElementById('formSection').style.display = 'none';
        document.getElementById('successSection').style.display = 'block';

      } catch (error) {
        console.error('Reset Error:', error);
        resetResult.className = 'msg-box msg-error';
        resetResult.innerHTML = `❌ 에러: ${error.message}`;
        resetResult.style.display = 'block';
        resetBtn.disabled = false;
        resetBtn.innerHTML = '📧 리셋 이메일 전송';
      }
    });
  </script>
</body>
</html>
