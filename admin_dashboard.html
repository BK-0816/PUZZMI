<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PUZZMI - 管理者ディッシュボード</title>
  <link rel="stylesheet" href="styles.css"/>
  <link rel="stylesheet" href="pages.css"/>
  <link rel="stylesheet" href="pages-theme.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    /* 공통 스타일 유지 및 보완 */
    :root {
      --sb-width: 260px;
      --header-height: 70px; /* 모바일 헤더 높이 정의 */
    }

    body.bg-cream { background: var(--bg-cream); margin: 0; padding: 0; min-height: 100vh; display: flex; }

    /* --- PC 사이드바 --- */
    .sidebar {
      width: var(--sb-width);
      background: white;
      border-right: 1px solid rgba(102, 126, 234, 0.1);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 100;
      transition: transform 0.3s ease;
    }

    .sb-header {
      height: 80px;
      display: flex; align-items: center; justify-content: center;
      border-bottom: 1px solid rgba(102, 126, 234, 0.1);
    }
    .sb-logo { font-size: 1.8rem; font-weight: 900; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    .sb-nav { flex: 1; padding: 20px 0; }
    .nav-item {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 24px;
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s;
      cursor: pointer;
    }
    .nav-item:hover { background: rgba(102, 126, 234, 0.05); color: #667eea; }
    .nav-item.active { background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(102, 126, 234, 0.05) 100%); color: #667eea; border-right: 4px solid #667eea; }

    .sb-footer { padding: 20px; border-top: 1px solid rgba(102, 126, 234, 0.1); }
    .admin-info { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .admin-avatar { width: 40px; height: 40px; border-radius: 50%; background: #eee; display: flex; align-items: center; justify-content: center; color: #aaa; }
    .admin-name { font-weight: 700; color: var(--text-primary); }

    /* --- 메인 콘텐츠 영역 --- */
    .main-content {
      flex: 1;
      margin-left: var(--sb-width);
      padding: 40px;
      box-sizing: border-box;
      transition: margin-left 0.3s ease;
    }

    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
    .page-title { font-size: 2rem; font-weight: 800; color: var(--text-primary); margin: 0; }
    
    /* 모바일 헤더 (기본 숨김) */
    .mobile-header { display: none; }

    /* --- 공통 카드 스타일 --- */
    .card { background: white; border-radius: 20px; border: 1px solid rgba(102, 126, 234, 0.1); padding: 32px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); margin-bottom: 24px; }
    .card-title { font-size: 1.25rem; font-weight: 700; color: var(--text-primary); margin: 0 0 24px 0; display: flex; align-items: center; gap: 10px; }

    /* --- 통계 그리드 --- */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; margin-bottom: 32px; }
    .stat-card { background: white; border-radius: 20px; border: 1px solid rgba(102, 126, 234, 0.1); padding: 24px; display: flex; align-items: center; gap: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
    .stat-icon { width: 60px; height: 60px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
    .stat-info { flex: 1; }
    .stat-label { font-size: 0.9rem; color: var(--text-secondary); font-weight: 500; margin-bottom: 4px; }
    .stat-value { font-size: 1.8rem; font-weight: 800; color: var(--text-primary); }

    /* --- 테이블 및 필터 --- */
    .table-controls { display: flex; justify-content: space-between; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
    .search-box { position: relative; flex: 1; min-width: 250px; }
    .search-input { width: 100%; padding: 14px 14px 14px 45px; border: 1px solid rgba(102, 126, 234, 0.2); border-radius: 12px; font-size: 0.95rem; box-sizing: border-box;}
    .search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); }
    .filter-group { display: flex; gap: 10px; flex-wrap: wrap;}
    .filter-select { padding: 12px 16px; border: 1px solid rgba(102, 126, 234, 0.2); border-radius: 12px; font-size: 0.9rem; color: var(--text-primary); background: white; }

    .data-table-container { overflow-x: auto; }
    .data-table { width: 100%; border-collapse: collapse; min-width: 800px; /* PC에서는 최소폭 유지 */ }
    .data-table th, .data-table td { text-align: left; padding: 18px; border-bottom: 1px solid rgba(102, 126, 234, 0.05); font-size: 0.95rem; }
    .data-table th { font-weight: 700; color: var(--text-secondary); background: rgba(102, 126, 234, 0.02); text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px; }
    .data-table tr:hover { background: rgba(102, 126, 234, 0.01); }

    /* --- 상태 배지 --- */
    .badge { padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 700; display: inline-flex; align-items: center; gap: 5px; }
    .badge-success { background: #d1f2eb; color: #0e6b47; }
    .badge-warning { background: #fef5e7; color: #b7950b; }
    .badge-danger { background: #fadbd8; color: #922b21; }
    .badge-verified { background: #eaf2f8; color: #1a5276; }
    .badge-mate { background: #f4ecf7; color: #6c3483; }

    /* --- 버튼 및 로딩 --- */
    .action-btn { padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(102, 126, 234, 0.2); background: white; color: var(--text-primary); cursor: pointer; font-size: 0.85rem; transition: all 0.2s; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; margin: 2px; }
    .action-btn:hover { background: rgba(102, 126, 234, 0.05); border-color: #667eea; color: #667eea; }
    .btn-verify { border-color: #7dcea0; color: #198754; }
    .btn-verify:hover { background: #eafaf1; border-color: #198754; color: #198754; }
    .btn-danger { border-color: #f1948a; color: #dc3545; }
    .btn-danger:hover { background: #fdf2f2; border-color: #dc3545; color: #dc3545; }

    .loader { display: none; text-align: center; padding: 40px; color: var(--text-secondary); }
    .spinner { animation: spin 1s infinite linear; margin-right: 10px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ==========================================================
       📱 모바일 반응형 핵심 패치 (Media Query)
       ========================================================== */
    @media (max-width: 992px) {
      body.bg-cream { flex-direction: column; } /* 세로 배치로 변경 */

      /* 1. PC 사이드바 숨기기 및 모바일 모드 전환 */
      .sidebar {
        transform: translateX(-100%); /* 왼쪽으로 숨김 */
        top: var(--header-height); /* 모바일 헤더 아래에서 시작 */
        width: 100%; height: auto;
        box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        border-right: none; border-bottom: 1px solid rgba(102, 126, 234, 0.1);
      }
      .sidebar.open { transform: translateX(0); } /* 열림 상태 */
      
      .sb-header, .sb-footer { display: none; } /* 모바일 메뉴 내 불필요 요소 숨김 */
      .sb-nav { padding: 10px 0; background: white; }
      .nav-item { padding: 14px 20px; font-size: 0.95rem; border-bottom: 1px solid #f5f5f5; }
      .nav-item.active { border-right: none; border-left: 4px solid #667eea; }

      /* 2. 모바일 상단 헤더 생성 */
      .mobile-header {
        display: flex;
        justify-content: space-between; align-items: center;
        height: var(--header-height);
        background: white;
        padding: 0 20px;
        position: fixed; top: 0; left: 0; right: 0;
        z-index: 101;
        border-bottom: 1px solid rgba(102, 126, 234, 0.1);
        box-sizing: border-box;
      }
      .mobile-logo { font-size: 1.4rem; font-weight: 900; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
      .menu-toggle { font-size: 1.5rem; color: #667eea; cursor: pointer; background: none; border: none; padding: 5px; }

      /* 3. 메인 콘텐츠 여백 조정 */
      .main-content {
        margin-left: 0;
        padding: 20px;
        margin-top: var(--header-height); /* 헤더 높이만큼 띄움 */
      }
      .page-header { flex-direction: column; align-items: flex-start; gap: 10px; margin-bottom: 20px; }
      .page-title { font-size: 1.6rem; }

      /* 4. 통계 그리드 조정 (4열 -> 2열) */
      .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 20px; }
      .stat-card { padding: 16px; gap: 12px; border-radius: 12px; }
      .stat-icon { width: 45px; height: 45px; border-radius: 10px; font-size: 1.2rem; }
      .stat-value { font-size: 1.4rem; }
      .stat-label { font-size: 0.8rem; }

      /* 5. 카드 및 컨트롤 조정 */
      .card { padding: 20px; border-radius: 16px; }
      .table-controls { flex-direction: column; gap: 10px; }
      .search-box, .filter-group { width: 100%; }
      .filter-select { flex: 1; font-size: 0.85rem; padding: 10px; }

      /* 6. ⭐ 핵심: 테이블 -> 카드 레이아웃 전환 ⭐ */
      .data-table-container { overflow-x: visible; } /* 가로 스크롤 해제 */
      .data-table { display: block; min-width: auto; } /* 테이블 형식을 블록으로 변경 */
      
      .data-table thead { display: none; } /* 테이블 헤더 숨김 */
      
      .data-table tbody { display: block; width: 100%; }
      .data-table tr { 
        display: block; 
        background: white; 
        border: 1px solid rgba(102, 126, 234, 0.1); 
        border-radius: 12px; 
        margin-bottom: 15px; 
        padding: 15px; 
        box-shadow: 0 2px 5px rgba(0,0,0,0.02);
      }
      .data-table tr:hover { background: white; transform: none; }

      .data-table td { 
        display: flex; /* 가로 배치 */
        justify-content: space-between; /* 양끝 정렬 */
        align-items: center;
        padding: 8px 0; 
        border-bottom: 1px solid #f5f5f5; 
        font-size: 0.9rem;
        text-align: right;
      }
      .data-table td:last-child { border-bottom: none; justify-content: flex-end; gap: 5px; flex-wrap: wrap; padding-top: 12px;} /* 액션 버튼 영역 */

      /* 데이터 라벨 삽입 (CSS로 항목명 표시) */
      .data-table td::before {
        content: attr(data-label); /* HTML의 data-label 속성값을 가져옴 */
        font-weight: 700;
        color: var(--text-secondary);
        text-align: left;
        text-transform: uppercase;
        font-size: 0.8rem;
        letter-spacing: 0.5px;
      }
      
      /* 터치 영역 확대를 위한 버튼 조정 */
      .action-btn { padding: 10px 14px; font-size: 0.9rem; margin: 3px; }
    }
    
    @media (max-width: 480px) {
        .stats-grid { grid-template-columns: 1fr; } /* 초소형 화면에서는 통계 1열 */
    }
  </style>
</head>
<body class="bg-cream">

  <header class="mobile-header">
    <div class="mobile-logo">PUZZMI ADMIN</div>
    <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
  </header>

  <aside class="sidebar" id="sidebar">
    <div class="sb-header">
      <div class="sb-logo">PUZZMI ADMIN</div>
    </div>
    <nav class="sb-nav">
      <a class="nav-item active" onclick="showSection('dashboard')"><i class="fas fa-chart-line"></i><span>ダッシュボード</span></a>
      <a class="nav-item" onclick="showSection('users')"><i class="fas fa-users"></i><span>ユーザー管理</span></a>
      <a class="nav-item" onclick="showSection('mates')"><i class="fas fa-user-friends"></i><span>メイト管理</span></a>
    </nav>
    <div class="sb-footer">
      <div class="admin-info">
        <div class="admin-avatar"><i class="fas fa-user-shield"></i></div>
        <div class="admin-name" id="adminName">Admin</div>
      </div>
      <button class="btn action-btn btn-danger" style="width:100%" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> ログアウト</button>
    </div>
  </aside>

  <main class="main-content">
    
    <div id="authLoader" class="loader" style="display: block; margin-top: 100px;">
        <i class="fas fa-spinner spinner"></i> 認証を確認中...
    </div>

    <section id="dashboardSection" style="display:none;">
      <div class="page-header">
        <h1 class="page-title">ダッシュボード</h1>
      </div>
      
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon" style="background: rgba(102,126,234,0.1); color: #667eea;"><i class="fas fa-users"></i></div>
          <div class="stat-info"><div class="stat-label">総ユーザー</div><div class="stat-value" id="statTotalUsers">0</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background: rgba(40,167,69,0.1); color: #28a745;"><i class="fas fa-user-check"></i></div>
          <div class="stat-info"><div class="stat-label">アクティブ</div><div class="stat-value" id="statActiveUsers">0</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background: rgba(111,66,193,0.1); color: #6f42c1;"><i class="fas fa-user-friends"></i></div>
          <div class="stat-info"><div class="stat-label">総メイト</div><div class="stat-value" id="statTotalMates">0</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background: rgba(23,162,184,0.1); color: #17a2b8;"><i class="fas fa-certificate"></i></div>
          <div class="stat-info"><div class="stat-label">認証済メイト</div><div class="stat-value" id="statVerifiedMates">0</div></div>
        </div>
      </div>

      <div class="card">
        <h3 class="card-title"><i class="fas fa-bell"></i> 最近のシステムアクティビティ</h3>
        <p style="color:var(--text-secondary);">ここに最近のログや主要な通知が表示されます。</p>
      </div>
    </section>

    <section id="usersSection" style="display:none;">
      <div class="page-header">
        <h1 class="page-title">ユーザー管理</h1>
      </div>
      <div class="card">
        <div class="table-controls">
          <div class="search-box">
            <i class="fas fa-search search-icon"></i>
            <input type="text" class="search-input" id="userSearch" placeholder="名前, メールで検索..."/>
          </div>
          <div class="filter-group">
            <select class="filter-select" id="filterUserStatus">
              <option value="">すべての状態</option>
              <option value="active">アクティブ</option>
              <option value="pending">待機中</option>
              <option value="suspended">停止</option>
            </select>
          </div>
        </div>
        <div class="data-table-container">
          <div id="usersLoader" class="loader"><i class="fas fa-spinner spinner"></i> 読み込み中...</div>
          <table class="data-table" id="usersTable">
            <thead>
              <tr>
                <th>ID</th>
                <th>名前</th>
                <th>メール</th>
                <th>状態</th>
                <th>役割</th>
                <th>アクション</th>
              </tr>
            </thead>
            <tbody id="userTableBody">
              </tbody>
          </table>
        </div>
      </div>
    </section>

    <section id="matesSection" style="display:none;">
      <div class="page-header">
        <h1 class="page-title">メイト管理</h1>
      </div>
      <div class="card">
        <div class="table-controls">
          <div class="search-box">
            <i class="fas fa-search search-icon"></i>
            <input type="text" class="search-input" id="mateSearch" placeholder="ユーザーIDで検索..."/>
          </div>
          <div class="filter-group">
            <select class="filter-select" id="filterMateVerified">
              <option value="">すべてのメイト</option>
              <option value="true">認証済</option>
              <option value="false">未認証</option>
            </select>
          </div>
        </div>
        <div class="data-table-container">
          <div id="matesLoader" class="loader"><i class="fas fa-spinner spinner"></i> 読み込み中...</div>
          <table class="data-table" id="matesTable">
            <thead>
              <tr>
                <th>ユーザーID</th>
                <th> hourly_rate</th>
                <th>言語</th>
                <th>状態</th>
                <th>アクション</th>
              </tr>
            </thead>
            <tbody id="mateTableBody">
              </tbody>
          </table>
        </div>
      </div>
    </section>

  </main>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
    const SUPABASE_URL = "https://eevvgbbokenpjnvtmztk.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVldnZnYmJva2VucGpudnRtenRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTc1NjI2OTgsImV4cCI6MjA3MzEzODY5OH0.aLoqYYeDW_0ZEwkr8c8IPFvXnEwQPZah1mQzwiyG2Y4";
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ==========================================================
    // 📱 모바일 UI 전용 JavaScript logic
    // ==========================================================
    const menuToggle = document.getElementById('menuToggle');
    const sidebar = document.getElementById('sidebar');

    // 모바일 햄버거 메뉴 토글
    if (menuToggle) {
        menuToggle.addEventListener('click', (e) => {
            e.stopPropagation(); // body 클릭 이벤트와 충돌 방지
            sidebar.classList.toggle('open');
        });
    }

    // 모바일 메뉴 열린 상태에서 화면 터치 시 닫기
    document.body.addEventListener('click', () => {
        if (sidebar.classList.contains('open') && window.innerWidth <= 992) {
            sidebar.classList.remove('open');
        }
    });

    // 섹션 전환 시 모바일 메뉴 자동으로 닫기 보완
    const pcNavLink = document.querySelectorAll('.sidebar .nav-item');
    pcNavLink.forEach(link => {
        link.addEventListener('click', () => {
            if (window.innerWidth <= 992) {
                sidebar.classList.remove('open');
            }
        });
    });

    // 창 크기 변경 시 스타일 초기화 방지
    window.addEventListener('resize', () => {
        if (window.innerWidth > 992) {
            sidebar.classList.remove('open');
        }
    });


    // ==========================================================
    // 🔐 기존 로직 및 권한 체크 (유지)
    // ==========================================================
    let currentUser = null;
    let profilesData = [];
    let matesData = [];

    window.addEventListener('DOMContentLoaded', async () => {
        const { data: { session }, error: sessionError } = await supabase.auth.getSession();
        
        document.getElementById('authLoader').style.display = 'none';

        if (sessionError || !session) {
            alert('管理者セッションが有効ではありません。ログインしてください。');
            location.replace('auth_combo.html');
            return;
        }

        currentUser = session.user;

        // ✅ profiles 테이블의 is_admin 값을 기준으로 최종 권한 체크
        const { data: profile, error: profileError } = await supabase
            .from('profiles')
            .select('full_name, is_admin')
            .eq('id', currentUser.id)
            .maybeSingle();

        if (profileError || !profile || !profile.is_admin) {
            alert('관리자 권한이 필요합니다. (profiles 테이블의 is_admin 확인 요망)');
            await supabase.auth.signOut();
            location.replace('index.html');
            return;
        }

        // 인증 완료
        document.getElementById('adminName').textContent = profile.full_name || '관리자';
        showSection('dashboard');
    });

    // 로그아웃
    window.handleLogout = async () => {
        if(confirm('ログアウトしますか？')) {
            await supabase.auth.signOut();
            location.replace('index.html');
        }
    }

    // ==========================================================
    // 📊 통계 및 데이터 로딩 로직 (보완)
    // ==========================================================
    
    // 섹션 전환 및 데이터 로드 호출
    window.showSection = (sectionName) => {
        const sections = ['dashboard', 'users', 'mates'];
        sections.forEach(s => {
            document.getElementById(`${s}Section`).style.display = 'none';
        });
        document.getElementById(`${sectionName}Section`).style.display = 'block';

        // 사이드바 active 클래스 관리
        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach(item => item.classList.remove('active'));
        
        // PC용 사이드바 메뉴 업데이트
        const targetNavIndex = sections.indexOf(sectionName);
        if(targetNavIndex !== -1) navItems[targetNavIndex].classList.add('active');

        // 데이터 로드
        if (sectionName === 'dashboard') loadDashboardStats();
        if (sectionName === 'users') loadUsers();
        if (sectionName === 'mates') loadMates();
    }

    // 1. 대시보드 통계
    async function loadDashboardStats() {
        // ... (기존 대시보드 로직 유지) ...
        try {
            const { count: totalUsers } = await supabase.from('profiles').select('*', { count: 'exact', head: true });
            const { count: activeUsers } = await supabase.from('profiles').select('*', { count: 'exact', head: true }).eq('account_status', 'active');
            const { count: totalMates } = await supabase.from('mate_profiles').select('*', { count: 'exact', head: true });
            const { count: verifiedMates } = await supabase.from('mate_profiles').select('*', { count: 'exact', head: true }).eq('is_verified', true);

            document.getElementById('statTotalUsers').textContent = totalUsers || 0;
            document.getElementById('statActiveUsers').textContent = activeUsers || 0;
            document.getElementById('statTotalMates').textContent = totalMates || 0;
            document.getElementById('statVerifiedMates').textContent = verifiedMates || 0;
        } catch (err) {
            console.error('Stats load error:', err);
        }
    }

    // 2. 유저 관리 데이터 로드
    async function loadUsers() {
        const loader = document.getElementById('usersLoader');
        const tbody = document.getElementById('userTableBody');
        
        loader.style.display = 'block';
        tbody.innerHTML = '';

        try {
            const { data, error } = await supabase
                .from('profiles')
                .select('id, full_name, email, account_status, is_admin')
                .order('created_at', { ascending: false });

            if (error) throw error;
            profilesData = data;
            renderUserTable(data);
        } catch (err) {
            tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;color:red;">❌ ${err.message}</td></tr>`;
        } finally {
            loader.style.display = 'none';
        }
    }

    // ⭐ 반응형 대응: User 테이블 렌더링 시 data-label 속성 주입 ⭐
    function renderUserTable(data) {
        const tbody = document.getElementById('userTableBody');
        tbody.innerHTML = '';

        if (data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">ユーザーが見つかりません。</td></tr>';
            return;
        }

        data.forEach(user => {
            const statusBadge = user.account_status === 'active' ? 'badge-success' : 'badge-warning';
            const roleBadge = user.is_admin ? 'badge-danger' : 'badge-mate';
            const roleText = user.is_admin ? 'Admin' : 'Mate/User';
            const shortId = user.id.substring(0, 8); // 모바일에서는 ID를 줄여서 표기

            const tr = document.createElement('tr');
            
            // ⭐ 각 <td>에data-label 속성을 추가하여 모바일 카드 레이아웃에서 항목명이 보이도록 합니다. ⭐
            tr.innerHTML = `
                <td data-label="ID" title="${user.id}">${shortId}...</td>
                <td data-label="名前"><strong>${user.full_name || '-'}</strong></td>
                <td data-label="メール">${user.email}</td>
                <td data-label="状態"><span class="badge ${statusBadge}">${user.account_status}</span></td>
                <td data-label="役割"><span class="badge ${roleBadge}">${roleText}</span></td>
                <td data-label="アクション">
                    <button class="action-btn" onclick="viewUserProfile('${user.id}')"><i class="fas fa-eye"></i></button>
                    ${!user.is_admin ? `<button class="action-btn btn-verify" onclick="makeMate('${user.id}')"><i class="fas fa-user-plus"></i></button>` : ''}
                    <button class="action-btn btn-danger" onclick="toggleUserStatus('${user.id}', '${user.account_status}')"><i class="fas fa-ban"></i></button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    // 3. 메이트 관리 데이터 로드
    async function loadMates() {
        const loader = document.getElementById('matesLoader');
        const tbody = document.getElementById('mateTableBody');
        
        loader.style.display = 'block';
        tbody.innerHTML = '';

        try {
            const { data, error } = await supabase
                .from('mate_profiles')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) throw error;
            matesData = data;
            renderMateTable(data);
        } catch (err) {
            tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;color:red;">❌ ${err.message}</td></tr>`;
        } finally {
            loader.style.display = 'none';
        }
    }

    // ⭐ 반응형 대응: Mate 테이블 렌더링 시 data-label 속성 주입 ⭐
    function renderMateTable(data) {
        const tbody = document.getElementById('mateTableBody');
        tbody.innerHTML = '';

        if (data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">メイトが見つかりません。</td></tr>';
            return;
        }

        data.forEach(mate => {
            const verifiedBadge = mate.is_verified ? 'badge-verified' : 'badge-warning';
            const verifiedText = mate.is_verified ? '認証済' : '未認証';
            const shortId = mate.user_id.substring(0, 8);

            const tr = document.createElement('tr');
            
            // ⭐ data-label 속성 주입 ⭐
            tr.innerHTML = `
                <td data-label="ユーザーID" title="${mate.user_id}">${shortId}...</td>
                <td data-label="hourly_rate">¥${mate.hourly_rate?.toLocaleString() || '0'}</td>
                <td data-label="言語">${mate.languages?.join(', ') || '-'}</td>
                <td data-label="状態"><span class="badge ${verifiedBadge}">${verifiedText}</span></td>
                <td data-label="アクション">
                    <a href="mate_edit.html?id=${mate.user_id}" class="action-btn" target="_blank"><i class="fas fa-edit"></i></a>
                    <button class="action-btn btn-verify" onclick="toggleVerify('${mate.user_id}', ${mate.is_verified})"><i class="fas fa-check-circle"></i></button>
                    <button class="action-btn btn-danger" onclick="deleteMate('${mate.user_id}')"><i class="fas fa-trash-alt"></i></button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    // ==========================================================
    // 🛠️ 관리자 액션 로직 (기존 유지)
    // ==========================================================
    
    // 유저 -> 메이트로 전환
    window.makeMate = async (userId) => {
        if(!confirm('이 유저를 메이트로 전환하시겠습니까? (mate_profiles 테이블에 기본 레코드를 생성합니다)')) return;
        
        const loader = document.getElementById('usersLoader');
        loader.style.display = 'block';

        try {
            const { data: user } = await supabase.from('profiles').select('email').eq('id', userId).single();
            if(!user) throw new Error('유저를 찾을 수 없습니다.');

            const mateData = {
                user_id: userId,
                email: user.email,
                hourly_rate: 1500,
                bio: '자기소개를 입력해주세요.',
                is_verified: false,
                profile_completion: 10
            };
            
            const { error } = await supabase.from('mate_profiles').insert(mateData);
            if (error) throw error;
            
            alert('메이트 전환 완료! 메이트 관리 탭에서 상세 내용을 편집해주세요.');
            loadUsers();
        } catch (err) {
            console.error(err);
            alert(`❌ 오류: ${err.message}`);
            loader.style.display = 'none';
        }
    }

    // 메이트 검증 상태 토글
    window.toggleVerify = async (mateId, currentStatus) => {
        const actionText = currentStatus ? '인증을 취소' : '인증을 승인';
        if(!confirm(`${actionText}하시겠습니까?`)) return;

        const loader = document.getElementById('matesLoader');
        loader.style.display = 'block';

        try {
            const { error } = await supabase
                .from('mate_profiles')
                .update({ is_verified: !currentStatus })
                .eq('user_id', mateId);
            
            if (error) throw error;
            loadMates();
        } catch (err) {
            console.error(err);
            alert(`❌ 오류: ${err.message}`);
            loader.style.display = 'none';
        }
    }

    // (참고) 다른 액션 함수들(toggleUserStatus, deleteMate, viewUserProfile)은
    // 기존에 존재하지 않거나 뼈대만 있으므로 여기서는 생략합니다.
    // 기존에 작동하던 다른 함수가 있다면 여기에 그대로 유지하세요.

    // ==========================================================
    // 🔍 검색 및 필터링 로직 (기존 유지)
    // ==========================================================
    
    // 유저 검색 및 필터
    const userSearch = document.getElementById('userSearch');
    const filterUserStatus = document.getElementById('filterUserStatus');

    function applyUserFilter() {
        const searchTerm = userSearch.value.toLowerCase().trim();
        const statusFilter = filterUserStatus.value;

        const filtered = profilesData.filter(user => {
            const matchesSearch = !searchTerm || 
                user.full_name?.toLowerCase().includes(searchTerm) || 
                user.email.toLowerCase().includes(searchTerm);
            const matchesStatus = !statusFilter || user.account_status === statusFilter;
            return matchesSearch && matchesStatus;
        });
        renderUserTable(filtered);
    }

    if(userSearch) userSearch.addEventListener('input', applyUserFilter);
    if(filterUserStatus) filterUserStatus.addEventListener('change', applyUserFilter);

    // 메이트 검색 및 필터
    const mateSearch = document.getElementById('mateSearch');
    const filterMateVerified = document.getElementById('filterMateVerified');

    function applyMateFilter() {
        const searchTerm = mateSearch.value.toLowerCase().trim();
        const verifiedFilter = filterMateVerified.value;

        const filtered = matesData.filter(mate => {
            const matchesSearch = !searchTerm || mate.user_id.toLowerCase().includes(searchTerm);
            const matchesVerified = !verifiedFilter || mate.is_verified.toString() === verifiedFilter;
            return matchesSearch && matchesVerified;
        });
        renderMateTable(filtered);
    }

    if(mateSearch) mateSearch.addEventListener('input', applyMateFilter);
    if(filterMateVerified) filterMateVerified.addEventListener('change', applyMateFilter);

  </script>
</body>
</html>
