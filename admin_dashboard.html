<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PUZZMI 관리자 대시보드</title>
  <link rel="stylesheet" href="styles.css"/>
  <link rel="stylesheet" href="pages.css"/>
  <link rel="stylesheet" href="pages-theme.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    body { background: #f5f7fa; min-height: 100vh; margin: 0; font-family: 'Noto Sans KR', sans-serif; }

    /* 헤더 반응형 */
    .admin-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .admin-header h1 {
      max-width: 1400px;
      margin: 0 auto;
      font-size: 1.5rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* 탭 네비게이션 반응형 */
    .tab-nav {
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .tab-nav-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      padding: 0 10px;
      overflow-x: auto; /* 모바일에서 탭 가로 스크롤 허용 */
      scrollbar-width: none; /* 파이어폭스 스크롤바 숨김 */
    }
    .tab-nav-inner::-webkit-scrollbar { display: none; } /* 크롬 스크롤바 숨김 */
    
    .tab-button {
      padding: 15px 20px;
      border: none;
      background: none;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.95rem;
      color: #666;
      border-bottom: 3px solid transparent;
      transition: all 0.3s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .tab-button.active {
      color: #667eea;
      border-bottom-color: #667eea;
      background: rgba(102, 126, 234, 0.05);
    }

    /* 컨텐츠 영역 */
    .tab-content {
      display: none;
      max-width: 1400px;
      margin: 20px auto;
      padding: 0 15px;
    }
    .tab-content.active { display: block; }

    /* 카드 */
    .card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      margin-bottom: 24px;
    }
    .card h2 { margin: 0 0 20px 0; font-size: 1.3rem; font-weight: 800; color: #333; }

    /* 툴바 반응형 */
    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap; /* 모바일에서 자동 줄바꿈 */
    }
    .toolbar input, .toolbar select {
      padding: 10px;
      border: 2px solid #e9ecef;
      border-radius: 8px;
      font-size: 0.9rem;
      flex: 1; /* 가급적 넓게 차지 */
      min-width: 150px;
    }
    .toolbar button { width: auto; flex-shrink: 0; }

    /* 테이블 반응형 핵심 */
    .table-responsive { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th {
      background: #f8f9fa;
      padding: 12px;
      text-align: left;
      font-weight: 700;
      color: #666;
      font-size: 0.85rem;
      border-bottom: 2px solid #e9ecef;
    }
    td { padding: 12px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; font-size: 0.9rem; }

    /* 버튼 모바일 최적화 */
    .btn {
      padding: 8px 12px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.85rem;
      white-space: nowrap;
    }
    .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; }
    .btn-success { background: #28a745; color: white; border: none; }
    .btn-secondary { background: #6c757d; color: white; border: none; }

    /* 배지 */
    .badge { padding: 4px 8px; border-radius: 8px; font-size: 0.75rem; font-weight: 600; }
    .badge-pending { background: #fff3cd; color: #856404; }
    .badge-confirmed { background: #d1e7dd; color: #0f5132; }

    /* 📱 모바일 전용 스타일 (768px 이하) */
    @media (max-width: 768px) {
      .admin-header h1 { font-size: 1.2rem; }
      .card { padding: 15px; }
      
      /* 테이블을 카드로 변환하는 테크닉 */
      table, thead, tbody, th, td, tr { display: block; }
      thead { display: none; } /* 헤더 숨김 */
      tr {
        border: 1px solid #eee;
        border-radius: 12px;
        margin-bottom: 15px;
        padding: 10px;
        background: #fff;
      }
      td {
        border: none;
        position: relative;
        padding-left: 40% !important; /* 라벨 공간 확보 */
        text-align: right;
        min-height: 35px;
        display: flex;
        align-items: center;
        justify-content: flex-end;
      }
      td::before {
        content: attr(data-label); /* data-label 속성 사용 */
        position: absolute;
        left: 10px;
        width: 35%;
        text-align: left;
        font-weight: 700;
        color: #888;
        font-size: 0.8rem;
      }
      td:last-child { 
        border-top: 1px solid #f0f0f0; 
        margin-top: 10px; 
        padding-top: 15px !important;
        padding-left: 10px !important;
        justify-content: center;
        gap: 5px;
      }
      
      /* 메이트 그리드 조정 */
      #matesGrid { grid-template-columns: 1fr !important; }
    }

    /* 로딩 애니메이션 */
    .loading i { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <header class="admin-header">
    <h1><i class="fas fa-crown"></i> PUZZMI 관리자 대시보드</h1>
  </header>

  <nav class="tab-nav">
    <div class="tab-nav-inner">
      <button class="tab-button active" data-tab="bookings"><i class="fas fa-calendar-check"></i> 예약 관리</button>
      <button class="tab-button" data-tab="mates"><i class="fas fa-users"></i> 메이트 관리</button>
      <button class="tab-button" data-tab="identity"><i class="fas fa-id-card"></i> 본인인증 관리</button>
      <button class="tab-button" data-tab="payments"><i class="fas fa-credit-card"></i> 결제 관리</button>
      <button class="tab-button" data-tab="users"><i class="fas fa-user-friends"></i> 유저 관리</button>
    </div>
  </nav>

  <div class="tab-content active" id="tab-bookings">
    <div class="card">
      <h2>예약 관리</h2>
      <div class="toolbar">
        <select id="statusFilter">
          <option value="pending">대기중</option>
          <option value="confirmed">확정</option>
          <option value="completed">완료</option>
          <option value="declined">거절</option>
          <option value="cancelled">취소</option>
          <option value="all">전체</option>
        </select>
        <input id="searchBooking" placeholder="고객명, 연락처 검색..."/>
        <button class="btn btn-primary" id="refreshBookings"><i class="fas fa-sync-alt"></i></button>
      </div>
      <div class="table-responsive">
        <table>
          <thead>
            <tr><th>상태</th><th>일시</th><th>고객</th><th>연락처</th><th>메이트</th><th>LINE</th><th>비고</th><th>조치</th></tr>
          </thead>
          <tbody id="bookingsTableBody">
            <tr><td colspan="8" class="loading" style="text-align:center;"><i class="fas fa-spinner"></i> 로딩 중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="tab-content" id="tab-mates">
    <div class="card">
      <h2>메이트 관리</h2>
      <div class="toolbar">
        <select id="verifyFilter">
          <option value="">검증 상태: 전체</option>
          <option value="true">검증됨만</option>
          <option value="false">미검증만</option>
        </select>
        <input id="searchMate" placeholder="이름, 태그 검색..."/>
        <button class="btn btn-primary" id="refreshMates"><i class="fas fa-sync-alt"></i></button>
      </div>
      <div id="matesGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px;">
        <div class="loading" style="grid-column: 1/-1; text-align:center;"><i class="fas fa-spinner"></i> 로딩 중...</div>
      </div>
    </div>
  </div>

  <div class="tab-content" id="tab-identity">
    <div class="card">
      <h2>본인인증 관리</h2>
      <div class="toolbar">
        <select id="identityFilter">
          <option value="all">전체</option>
          <option value="pending">대기중</option>
          <option value="passport_uploaded">심사 대기</option>
          <option value="approved">승인됨</option>
          <option value="rejected">거부됨</option>
        </select>
        <button class="btn btn-primary" id="refreshIdentity"><i class="fas fa-sync-alt"></i> 새로고침</button>
      </div>
      <div id="identityRequests">
        <div class="loading" style="text-align:center;"><i class="fas fa-spinner"></i> 로딩 중...</div>
      </div>
    </div>
  </div>

  <div class="tab-content" id="tab-payments">
    <div class="card">
      <h2>결제 관리</h2>
      <div class="toolbar">
        <select id="paymentFilter">
          <option value="all">전체</option>
          <option value="pending">대기중</option>
          <option value="paid">결제 완료</option>
          <option value="failed">실패</option>
        </select>
        <button class="btn btn-primary" id="refreshPayments"><i class="fas fa-sync-alt"></i> 새로고침</button>
      </div>
      <div class="table-responsive">
        <table>
          <thead><tr><th>ID</th><th>고객</th><th>금액</th><th>상태</th><th>날짜</th></tr></thead>
          <tbody id="paymentsTableBody">
            <tr><td colspan="5" class="loading" style="text-align:center;"><i class="fas fa-spinner"></i> 로딩 중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="tab-content" id="tab-users">
    <div class="card">
      <h2>유저 관리</h2>
      <div class="toolbar">
        <input id="searchUser" placeholder="이름, 이메일 검색..."/>
        <button class="btn btn-primary" id="refreshUsers"><i class="fas fa-sync-alt"></i></button>
      </div>
      <div class="table-responsive">
        <table>
          <thead><tr><th>이름</th><th>이메일</th><th>나이/성별</th><th>메이트</th><th>조치</th></tr></thead>
          <tbody id="usersTableBody">
            <tr><td colspan="5" class="loading" style="text-align:center;"><i class="fas fa-spinner"></i> 로딩 중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
    const SUPABASE_URL = "https://eevvgbbokenpjnvtmztk.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVldnZnYmJva2VucGpudnRtenRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTc1NjI2OTgsImV4cCI6MjA3MzEzODY5OH0.aLoqYYeDW_0ZEwkr8c8IPFvXnEwQPZah1mQzwiyG2Y4";
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // 🔐 관리자 인증 확인 (기존 로직 유지)
    async function checkAdmin() {
      const { data: { user } } = await supabase.auth.getUser();
      if (!user) location.replace('auth_combo.html?redirect=admin_dashboard.html');
      const { data: profile } = await supabase.from('profiles').select('is_admin').eq('id', user.id).maybeSingle();
      if (!profile?.is_admin) { alert('관리자 권한이 필요합니다.'); location.replace('index.html'); }
      return user;
    }
    const adminUser = await checkAdmin();

    // 📑 탭 전환 로직
    document.querySelectorAll('.tab-button').forEach(btn => {
      btn.addEventListener('click', () => {
        const tabName = btn.dataset.tab;
        document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(`tab-${tabName}`).classList.add('active');
        if (tabName === 'bookings') loadBookings();
        else if (tabName === 'mates') loadMates();
        else if (tabName === 'identity') loadIdentity();
        else if (tabName === 'payments') loadPayments();
        else if (tabName === 'users') loadUsers();
      });
    });

    // 📅 예약 관리 (기능 유지 및 반응형 속성 data-label 추가)
    let allBookings = [];
    let matesMap = new Map();
    let lineAccountsMap = new Map();

    async function loadBookings() {
      const tbody = document.getElementById('bookingsTableBody');
      try {
        const [{data: mates}, {data: lineAcc}, {data: bookings}] = await Promise.all([
          supabase.from('mate_profiles').select('user_id, profiles(full_name)'),
          supabase.from('user_line_accounts').select('user_id, line_display_name').eq('is_verified', true),
          supabase.from('bookings').select('*').order('created_at', { ascending: false }).limit(100)
        ]);
        matesMap = new Map(mates?.map(m => [m.user_id, m.profiles?.full_name || '이름없음']));
        lineAccountsMap = new Map(lineAcc?.map(l => [l.user_id, l.line_display_name]));
        allBookings = bookings || [];
        renderBookings();
      } catch (e) { console.error(e); }
    }

    function renderBookings() {
      const tbody = document.getElementById('bookingsTableBody');
      const statusFilter = document.getElementById('statusFilter').value;
      const search = document.getElementById('searchBooking').value.toLowerCase();

      const filtered = allBookings.filter(b => {
        if (statusFilter !== 'all' && b.status !== statusFilter) return false;
        if (search && !b.customer_name?.toLowerCase().includes(search)) return false;
        return true;
      });

      tbody.innerHTML = filtered.map(b => `
        <tr>
          <td data-label="상태"><span class="badge badge-${b.status}">${b.status}</span></td>
          <td data-label="일시">${b.date} ${b.start_time}</td>
          <td data-label="고객">${b.customer_name}</td>
          <td data-label="연락처">${b.customer_contact || '-'}</td>
          <td data-label="메이트">${matesMap.get(b.mate_id) || '미정'}</td>
          <td data-label="LINE">${lineAccountsMap.get(b.customer_id) || '미연동'}</td>
          <td data-label="비고">${b.cancel_reason || b.decline_reason || '-'}</td>
          <td>
            <button class="btn btn-success" onclick="sendPassportRequest('${b.id}')">🛂 여권</button>
            <button class="btn btn-success" onclick="sendPaymentRequest('${b.id}')">💳 결제</button>
          </td>
        </tr>
      `).join('') || '<tr><td colspan="8" style="text-align:center;">데이터가 없습니다.</td></tr>';
    }

    // 🛂 여권/결제 요청 로직 (기존 코드 그대로 유지)
    window.sendPassportRequest = async function(bookingId) {
      const booking = allBookings.find(b => b.id == bookingId);
      if(!confirm('여권 인증 링크를 LINE으로 발송하시겠습니까?')) return;
      try {
        const token = crypto.randomUUID();
        await supabase.from('identity_verification_requests').insert({ user_id: booking.customer_id, status: 'pending', verification_token: token });
        const {data:{session}} = await supabase.auth.getSession();
        const res = await fetch(`${SUPABASE_URL}/functions/v1/send-line-notification`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}`},
          body: JSON.stringify({ userId: booking.customer_id, type: 'identity_verification_request', uploadUrl: `${location.origin}/passport_upload_token.html?token=${token}` })
        });
        const result = await res.json();
        alert(result.success ? '✓ 발송 완료!' : '실패: ' + result.error);
      } catch (e) { alert(e.message); }
    };

    window.sendPaymentRequest = async function(bookingId) {
      const amount = prompt('결제 금액(원):', '40000');
      if (!amount) return;
      const booking = allBookings.find(b => b.id == bookingId);
      try {
        const token = crypto.randomUUID();
        await supabase.from('bookings').update({ payment_token: token, payment_status: 'pending' }).eq('id', bookingId);
        const {data:{session}} = await supabase.auth.getSession();
        const res = await fetch(`${SUPABASE_URL}/functions/v1/send-line-notification`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}`},
          body: JSON.stringify({ userId: booking.customer_id, bookingId, type: 'payment_request', paymentUrl: `${location.origin}/payment_page.html?token=${token}`, amount: parseInt(amount) })
        });
        const result = await res.json();
        if(result.success) alert('✓ 결제 링크 발송 완료!');
      } catch (e) { alert(e.message); }
    };

    // 👥 유저 관리 (반응형 data-label 추가)
    let allUsers = [];
    async function loadUsers() {
      const tbody = document.getElementById('usersTableBody');
      const {data: profiles} = await supabase.from('profiles').select('id, full_name, email, age, gender').order('created_at', { ascending: false });
      const {data: mates} = await supabase.from('mate_profiles').select('user_id');
      const mateSet = new Set(mates?.map(m => m.user_id));
      allUsers = profiles.map(p => ({ ...p, is_mate: mateSet.has(p.id) }));
      renderUsers();
    }

    function renderUsers() {
      const tbody = document.getElementById('usersTableBody');
      const search = document.getElementById('searchUser').value.toLowerCase();
      const filtered = allUsers.filter(u => u.full_name?.toLowerCase().includes(search) || u.email?.toLowerCase().includes(search));
      tbody.innerHTML = filtered.map(u => `
        <tr>
          <td data-label="이름">${u.full_name || '-'}</td>
          <td data-label="이메일">${u.email}</td>
          <td data-label="나이/성별">${u.age || '-'}/${u.gender || '-'}</td>
          <td data-label="메이트">${u.is_mate ? '✅' : '일반'}</td>
          <td>
            ${!u.is_mate ? `<button class="btn btn-success" onclick="convertToMate('${u.id}')">전환</button>` : `<button class="btn btn-secondary" onclick="removeMate('${u.id}')">해제</button>`}
          </td>
        </tr>
      `).join('');
    }

    // 메이트 전환/해제 (기존 로직 유지)
    window.convertToMate = async (userId) => {
      if(!confirm('메이트로 전환하시겠습니까?')) return;
      await supabase.from('mate_profiles').insert({ user_id: userId, hourly_rate: 4000, bio: '', is_verified: false });
      alert('완료'); loadUsers();
    };
    window.removeMate = async (userId) => {
      if(!confirm('해제하시겠습니까?')) return;
      await supabase.from('mate_profiles').delete().eq('user_id', userId);
      alert('완료'); loadUsers();
    };

    // 초기 이벤트 리스너
    document.getElementById('statusFilter').onchange = renderBookings;
    document.getElementById('searchBooking').oninput = renderBookings;
    document.getElementById('refreshBookings').onclick = loadBookings;
    document.getElementById('searchUser').oninput = renderUsers;
    document.getElementById('refreshUsers').onclick = loadUsers;

    // 본인인증 심사 로드 (기존 UI 로직 유지)
    async function loadIdentity() {
      const container = document.getElementById('identityRequests');
      const {data: requests} = await supabase.from('identity_verification_requests').select('*, profiles(full_name, email, phone_number, birth_date)').order('created_at', { ascending: false });
      container.innerHTML = requests?.map(req => `
        <div class="card" style="border: 1px solid #eee;">
          <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px;">
            <div><strong>${req.profiles?.full_name}</strong><br><small>${req.profiles?.email}</small></div>
            <span class="badge badge-pending">${req.status}</span>
          </div>
          ${req.passport_image_url ? `<img src="${req.passport_image_url}" style="width:100%; border-radius:8px; margin-bottom:10px; cursor:pointer;" onclick="window.open(this.src)">` : '<p>이미지 미업로드</p>'}
          <div style="display:flex; gap:5px;">
            <button class="btn btn-success" style="flex:1" onclick="approveIdentity('${req.id}')">승인</button>
            <button class="btn btn-secondary" style="flex:1" onclick="rejectIdentity('${req.id}')">거부</button>
          </div>
        </div>
      `).join('') || '내역이 없습니다.';
    }

    // 초기 데이터 로드
    loadBookings();
  </script>
</body>
</html>
