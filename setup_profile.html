<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PUZZMI - プロフィール設定 (2/2)</title>
  <link rel="stylesheet" href="styles.css"/>
  <link rel="stylesheet" href="pages.css"/>
  <link rel="stylesheet" href="pages-theme.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    /* 공통 스타일 (위 HTML과 동일하게 유지) */
    body.bg-cream { background: var(--bg-cream); background-repeat: no-repeat; background-size: cover; min-height: 100vh; position: relative; overflow-x: hidden; }
    .decorative-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
    .decorative-element { position: absolute; border-radius: 50%; filter: blur(60px); opacity: 0.25; animation: float 12s ease-in-out infinite; }
    .decorative-element:nth-child(1) { width: 300px; height: 300px; background: linear-gradient(45deg, #667eea, #764ba2); top: 10%; left: -5%; }
    .decorative-element:nth-child(2) { width: 250px; height: 250px; background: linear-gradient(45deg, #f093fb, #f5576c); top: 50%; right: -8%; animation-delay: 4s; }
    .decorative-element:nth-child(3) { width: 200px; height: 200px; background: linear-gradient(45deg, #4facfe, #00f2fe); bottom: 15%; left: 10%; animation-delay: 8s; }
    @keyframes float { 0%, 100% { transform: translateY(0px) rotate(0deg) scale(1); } 50% { transform: translateY(-20px) rotate(180deg) scale(0.9); } }
    .signup-container { max-width: 600px; margin: 40px auto; padding: 0 20px; position: relative; z-index: 1; }
    .signup-card { background: linear-gradient(135deg, rgba(255,255,255,0.98) 0%, rgba(255,255,255,0.92) 100%); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.4); border-radius: 28px; padding: 50px; box-shadow: 0 30px 80px rgba(0,0,0,0.08); position: relative; overflow: hidden; }
    .signup-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 6px; background: linear-gradient(90deg, #667eea 0%, #764ba2 20%, #f093fb 40%, #f5576c 60%, #4facfe 80%, #00f2fe 100%); }
    .signup-header { text-align: center; margin-bottom: 40px; }
    .signup-title { font-size: 2.5rem; font-weight: 900; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 16px; }
    .signup-subtitle { color: var(--text-secondary); font-size: 1.1rem; line-height: 1.6; font-weight: 500; }
    .step-indicator { display: flex; justify-content: center; align-items: center; gap: 16px; margin: 32px 0; padding: 20px; background: rgba(102, 126, 234, 0.05); border-radius: 16px; border: 2px solid rgba(102, 126, 234, 0.2); }
    .step { display: flex; align-items: center; gap: 8px; padding: 8px 16px; border-radius: 20px; font-weight: 600; font-size: 0.9rem; }
    .step.completed { background: linear-gradient(135deg, #28a745 0%, #20c997 100%); color: white; }
    .step.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3); }
    .step-arrow { color: var(--text-secondary); font-size: 1.2rem; }
    .form-grid { display: grid; gap: 24px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .form-row.single { grid-template-columns: 1fr; }
    .form-field { position: relative; }
    .form-label { display: block; font-weight: 700; color: var(--text-primary); margin-bottom: 8px; font-size: 0.95rem; text-transform: uppercase; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .form-label.required::after { content: ' *'; color: #f5576c; font-weight: 800; }
    .form-input, .form-select { width: 100%; padding: 16px 20px; border: 2px solid rgba(102, 126, 234, 0.2); border-radius: 12px; font-size: 1rem; transition: all 0.3s; box-sizing: border-box; background: rgba(255,255,255,0.9); }
    .form-input:focus, .form-select:focus { outline: none; border-color: rgba(102, 126, 234, 0.5); box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1); }
    .checkbox-group { display: flex; flex-direction: column; gap: 12px; padding: 16px; background: rgba(102, 126, 234, 0.05); border-radius: 12px; border: 1px solid rgba(102, 126, 234, 0.2); }
    .checkbox-item { display: flex; align-items: center; gap: 12px; cursor: pointer; padding: 12px 16px; background: rgba(255,255,255,0.8); border-radius: 8px; border: 1px solid rgba(255,255,255,0.4); }
    .checkbox-item input { width: 20px; height: 20px; accent-color: #667eea; cursor: pointer; }
    .btn { width: 100%; padding: 16px 32px; border-radius: 12px; font-weight: 700; font-size: 1rem; border: none; cursor: pointer; transition: all 0.3s ease; display:flex; justify-content:center; align-items:center; gap:8px;}
    .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
    .btn-secondary { background: rgba(102, 126, 234, 0.1); color: #667eea; border: 2px solid rgba(102, 126, 234, 0.2); }
    .btn-line { background: linear-gradient(135deg, #00C300 0%, #00B900 100%); color: white; }
    .btn-primary:hover:not(:disabled), .btn-line:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(0,0,0,0.15); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .msg-box { padding: 16px 20px; border-radius: 12px; font-weight: 600; margin: 16px 0; display:none; }
    .msg-error { background: #fadbd8; color: #922b21; border: 2px solid rgba(220, 53, 69, 0.3); display:block; }
    .msg-success { background: #d1f2eb; color: #0e6b47; border: 2px solid rgba(25, 135, 84, 0.3); display:block; }
    .loading { width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s infinite linear; margin-right:8px;}
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-cream">
  <div class="decorative-bg">
    <div class="decorative-element"></div>
    <div class="decorative-element"></div>
    <div class="decorative-element"></div>
  </div>

  <main class="signup-container">
    <section class="signup-card">
      <div class="signup-header">
        <h1 class="signup-title">プロフィール設定</h1>
        <p class="signup-subtitle">メイトに公開される基本情報を入力してください。</p>
      </div>

      <div class="step-indicator">
        <div class="step completed"><i class="fas fa-check"></i><span>アカウント作成</span></div>
        <div class="step-arrow">→</div>
        <div class="step active"><i class="fas fa-user"></i><span>プロフィール設定</span></div>
      </div>

      <div id="profileSection">
        <form class="form-grid" id="profileForm">
          <div class="form-row">
            <div class="form-field">
              <label class="form-label required" for="fullName">名前 (フリガナ)</label>
              <input class="form-input" type="text" id="fullName" required placeholder="ヤマダ タロウ"/>
            </div>
            <div class="form-field">
              <label class="form-label required" for="birthDate">生年月日</label>
              <input class="form-input" type="date" id="birthDate" required/>
            </div>
          </div>
          
          <div class="form-row">
            <div class="form-field">
              <label class="form-label required" for="gender">性別</label>
              <select class="form-select" id="gender" required>
                <option value="">選択してください</option>
                <option value="여성">女性</option>
                <option value="남성">男性</option>
              </select>
            </div>
            <div class="form-field">
              <label class="form-label required" for="phoneNumber">電話番号</label>
              <input class="form-input" type="tel" id="phoneNumber" required placeholder="090-1234-5678"/>
            </div>
          </div>
          
          <div class="form-row">
            <div class="form-field">
              <label class="form-label required" for="nationality">国籍</label>
              <select class="form-select" id="nationality" required>
                <option value="">選択してください</option>
                <option value="일본">🇯🇵 日本</option>
                <option value="한국">🇰🇷 韓国</option>
                <option value="중국">🇨🇳 中国</option>
                <option value="미국">🇺🇸 アメリカ</option>
              </select>
            </div>
            <div class="form-field">
              <label class="form-label" for="residence">現在居住地</label>
              <input class="form-input" type="text" id="residence" placeholder="例: 東京都"/>
            </div>
          </div>
          
          <div class="form-row single">
            <div class="form-field">
              <label class="form-label required">使用可能な言語 (1つ以上)</label>
              <div class="checkbox-group" id="languageGroup">
                <label class="checkbox-item"><input type="checkbox" value="日本語"/><span>🇯🇵 日本語</span></label>
                <label class="checkbox-item"><input type="checkbox" value="한국어"/><span>🇰🇷 한국어</span></label>
                <label class="checkbox-item"><input type="checkbox" value="English"/><span>🇺🇸 English</span></label>
                <label class="checkbox-item"><input type="checkbox" value="中文"/><span>🇨🇳 中文</span></label>
              </div>
            </div>
          </div>

          <div id="profileResult" class="msg-box"></div>
          <button type="submit" class="btn btn-primary" id="completeBtn">
            ✨ 会員登録を完了する
          </button>
        </form>
      </div>

      <div id="completionSection" style="display:none; text-align:center;">
        <div style="font-size: 5rem; margin-bottom: 16px; animation: float 3s ease-in-out infinite;">🎉</div>
        <h2 style="font-size:2.2rem; font-weight:800; color:#28a745; margin-bottom:16px;">会員登録完了！</h2>
        <p style="font-size:1.1rem; color:var(--text-secondary); margin-bottom:32px;">PUZZMIへようこそ！<br>素敵な旅行を計画してみてください。</p>
        
        <div style="background: rgba(0, 195, 0, 0.05); border: 2px solid rgba(0, 195, 0, 0.2); border-radius: 20px; padding: 32px; margin-bottom: 24px;">
          <i class="fab fa-line" style="font-size: 3.5rem; color: #00C300; margin-bottom: 16px;"></i>
          <h3 style="font-size:1.4rem; font-weight:800; margin-bottom:8px;">LINEアカウント連動 (オプション)</h3>
          <p style="color:#666; font-size:0.95rem; margin-bottom:24px;">予約確定および決済案内を受けるために必要です。</p>
          
          <button class="btn btn-line" id="lineConnectBtn" style="margin-bottom:12px;">
            <i class="fab fa-line"></i> 今LINE連動する
          </button>
          <button class="btn btn-secondary" onclick="window.location.href='index.html'">
            後で連動する (ホームへ)
          </button>
          <div id="lineStatus" class="msg-box" style="margin-top:16px;"></div>
        </div>
      </div>

    </section>
  </main>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
    const SUPABASE_URL = "https://eevvgbbokenpjnvtmztk.supabase.co";
    // 🚨 기존에 복사해두셨던 본인의 진짜 ANON_KEY 로 꼭 바꿔주세요!
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVldnZnYmJva2VucGpudnRtenRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTc1NjI2OTgsImV4cCI6MjA3MzEzODY5OH0.aLoqYYeDW_0ZEwkr8c8IPFvXnEwQPZah1mQzwiyG2Y4";
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;

    // 1. Supabase가 세션을 해독하고 로그인을 완료할 때까지 기다리는 "리스너"
    supabase.auth.onAuthStateChange(async (event, session) => {
      console.log('Auth Event:', event); // 디버깅용
      
      // 로그인이 완료되었거나 이미 세션이 있는 경우
      if (event === 'SIGNED_IN' || event === 'INITIAL_SESSION') {
        if (session && session.user) {
          currentUser = session.user;
          console.log('✅ 세션 획득 성공:', currentUser.email);

          // 이미 프로필을 작성했는지 확인 (중복 작성 방지)
          const { data: profile } = await supabase.from('profiles').select('id').eq('id', currentUser.id).maybeSingle();
          if (profile) {
            alert("すでにプロフィール設定が完了しています。メインページに移動します。");
            window.location.href = 'index.html';
            return;
          }

          // 폼 완료 버튼 활성화 (로딩 끝!)
          const completeBtn = document.getElementById('completeBtn');
          completeBtn.disabled = false;
          completeBtn.innerHTML = '✨ 会員登録を完了する';
        }
      }
    });

    // 2. 페이지 로드 초기 설정
    window.addEventListener('DOMContentLoaded', () => {
      document.getElementById('birthDate').max = new Date().toISOString().split('T')[0];
      
      // 초기에는 버튼을 막아두고 "인증 확인 중" 표시
      const completeBtn = document.getElementById('completeBtn');
      completeBtn.disabled = true;
      completeBtn.innerHTML = '<div class="loading"></div> 認証を確認中...';

      // 🚨 만약 3초가 지났는데도 currentUser가 없다면 진짜 비정상 접근임 (쫓아내기)
      setTimeout(() => {
        if (!currentUser) {
          alert("セッションが有効ではありません。再度ログインしてください。");
          window.location.href = 'auth_combo.html';
        }
      }, 3000);
    });

    // 3. 폼 제출 (프로필 생성)
    document.getElementById('profileForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const fullName = document.getElementById('fullName').value.trim();
      const birthDate = document.getElementById('birthDate').value;
      const gender = document.getElementById('gender').value;
      const phoneNumber = document.getElementById('phoneNumber').value.trim();
      const nationality = document.getElementById('nationality').value;
      const residence = document.getElementById('residence').value.trim();
      
      const languages = Array.from(document.querySelectorAll('#languageGroup input:checked')).map(cb => cb.value);
      const resultBox = document.getElementById('profileResult');

      if (languages.length === 0) {
        resultBox.className = 'msg-box msg-error';
        resultBox.innerHTML = '❌ 少なくとも 1 つの言語を選択してください。';
        return;
      }

      // 나이 계산 검증
      const birth = new Date(birthDate);
      let age = new Date().getFullYear() - birth.getFullYear();
      if (new Date().getMonth() < birth.getMonth()) age--;
      if (age < 16) {
        resultBox.className = 'msg-box msg-error';
        resultBox.innerHTML = '❌ 16歳以上のみ加入可能です。';
        return;
      }

      const btn = document.getElementById('completeBtn');
      btn.disabled = true;
      btn.innerHTML = '<div class="loading"></div> 処理中...';

      try {
        // 전화번호 중복 검사
        const { data: existPhone } = await supabase.from('profiles').select('phone_number').eq('phone_number', phoneNumber).maybeSingle();
        if (existPhone) throw new Error('この電話番号は既に登録されています。');

        const profileData = {
          id: currentUser.id,
          email: currentUser.email,
          full_name: fullName,
          birth_date: birthDate,
          gender: gender,
          languages: languages,
          phone_number: phoneNumber,
          nationality: nationality,
          residence: residence || null,
          profile_completion: 85,
          account_status: 'active'
        };
        
        const { error: profileError } = await supabase.from('profiles').upsert(profileData);
        if (profileError) throw profileError;

        // 화면 전환
        document.getElementById('profileSection').style.display = 'none';
        document.querySelector('.step-indicator').style.display = 'none';
        document.getElementById('completionSection').style.display = 'block';

      } catch (error) {
        console.error('Profile Error:', error);
        resultBox.className = 'msg-box msg-error';
        resultBox.innerHTML = `❌ エラー: ${error.message}`;
        btn.disabled = false;
        btn.innerHTML = '✨ 会員登録を完了する';
      }
    });

    // 4. LINE 연동 로직 (기존과 동일)
    document.getElementById('lineConnectBtn').addEventListener('click', async () => {
      const btn = document.getElementById('lineConnectBtn');
      const statusEl = document.getElementById('lineStatus');
      const popup = window.open('about:blank', 'lineLogin', 'width=500,height=600,scrollbars=yes');
      
      if (!popup) {
        statusEl.className = 'msg-box msg-error';
        statusEl.innerHTML = '❌ ポップアップブロックを解除してください。';
        return;
      }
      
      btn.disabled = true;
      btn.innerHTML = '<div class="loading"></div> LINE連動中...';
      
      try {
        const { data: { session } } = await supabase.auth.getSession();
        const res = await fetch(`${SUPABASE_URL}/functions/v1/line-auth/generate-url`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${session.access_token}`,
            'Origin': window.location.origin
          },
          body: JSON.stringify({ requestOrigin: window.location.origin })
        });

        const result = await res.json();
        if (!result.success) throw new Error('LINE URL 生成失敗');

        popup.location.href = result.loginUrl;
        
        const checkAuth = setInterval(() => {
          if (popup && popup.closed) {
            clearInterval(checkAuth);
            statusEl.className = 'msg-box msg-success';
            statusEl.innerHTML = '✅ LINE連動が完了したか、ウィンドウが閉じられました。';
            btn.innerHTML = '<i class="fab fa-line"></i> ホームへ移動';
            btn.onclick = () => window.location.href = 'index.html';
            btn.disabled = false;
          }
        }, 1000);
        
      } catch (error) {
        if (popup && !popup.closed) popup.close();
        statusEl.className = 'msg-box msg-error';
        statusEl.innerHTML = `❌ エラー: ${error.message}`;
        btn.disabled = false;
        btn.innerHTML = '<i class="fab fa-line"></i> 今LINE連動する';
      }
    });
  </script>
