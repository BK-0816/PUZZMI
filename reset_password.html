<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PUZZMI - パスワードの再設定</title>
  <link rel="stylesheet" href="styles.css"/>
  <link rel="stylesheet" href="pages.css"/>
  <link rel="stylesheet" href="pages-theme.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    body.bg-cream { background: var(--bg-cream); background-repeat: no-repeat; background-size: cover; min-height: 100vh; }
    
    .page { 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      min-height: 100vh; 
      padding: 20px; 
    }
    
    /* 기존 카드 디자인 유지 */
    .card {
      background: linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.85) 100%);
      backdrop-filter: blur(25px);
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 28px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.08), 0 12px 32px rgba(0,0,0,0.04);
      padding: 50px;
      width: 100%;
      max-width: 480px;
      position: relative;
      overflow: hidden;
    }
    
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: linear-gradient(90deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      animation: shimmer 3s ease-in-out infinite;
    }
    
    @keyframes shimmer {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.8; }
    }
    
    .card h2 {
      font-size: 2.2rem;
      font-weight: 900;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }
    
    .subtitle {
      text-align: center;
      margin-bottom: 32px;
      font-size: 1rem;
      color: var(--text-secondary);
      line-height: 1.6;
    }
    
    .form-grid {
      display: grid;
      gap: 24px;
    }
    
    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .label {
      font-weight: 700;
      color: var(--text-primary);
      font-size: 0.95rem;
      text-transform: uppercase;
    }
    
    .input {
      width: 100%;
      padding: 16px 20px;
      border: 2px solid rgba(102, 126, 234, 0.2);
      border-radius: 12px;
      background: white;
      font-size: 1rem;
      transition: all 0.3s ease;
      box-sizing: border-box;
    }
    
    .input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
      transform: translateY(-1px);
    }

    .btn {
      width: 100%;
      padding: 18px;
      border-radius: 14px;
      font-weight: 800;
      font-size: 1.1rem;
      border: none;
      cursor: pointer;
      transition: all 0.3s ease;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
      margin-top: 8px;
    }
    
    .btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 15px 30px rgba(102, 126, 234, 0.4);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .msg-box {
      padding: 16px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 0.9rem;
      text-align: center;
      margin-top: 16px;
      display: none;
    }

    .msg-error { background: #fadbd8; color: #922b21; border: 1px solid #f1948a; display: block; }
    .msg-success { background: #d1f2eb; color: #0e6b47; border: 1px solid #a3e4d7; display: block; }

    /* 모바일 반응형 */
    @media (max-width: 768px) {
      .card { padding: 40px 24px; border-radius: 24px; }
      .card h2 { font-size: 1.8rem; }
      .input { padding: 14px 18px; }
    }
  </style>
</head>
<body class="bg-cream">
  <main class="page">
    <section class="card">
      <h2>新しいパスワード</h2>
      <p class="subtitle">新しく使用するパスワードを<br>8文字以上で入力してください。</p>

      <form id="newPasswordForm" class="form-grid">
        <div class="field">
          <label class="label">新しいパスワード</label>
          <input class="input" id="password" type="password" placeholder="8文字以上入力" required minlength="8"/>
        </div>
        
        <div class="field">
          <label class="label">パスワードの確認</label>
          <input class="input" id="confirmPassword" type="password" placeholder="もう一度入力" required minlength="8"/>
        </div>

        <button class="btn" type="submit" id="submitBtn">パスワードを変更する</button>
        <div id="message" class="msg-box"></div>
      </form>
    </section>
  </main>

<script type="module">
  import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
  const SUPABASE_URL = "https://eevvgbbokenpjnvtmztk.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVldnZnYmJva2VucGpudnRtenRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTc1NjI2OTgsImV4cCI6MjA3MzEzODY5OH0.aLoqYYeDW_0ZEwkr8c8IPFvXnEwQPZah1mQzwiyG2Y4";
  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const form = document.getElementById('newPasswordForm');
  const msgBox = document.getElementById('message');
  const submitBtn = document.getElementById('submitBtn');

  // [추가] 페이지 로드 시 URL에 에러가 섞여 있는지 먼저 확인
  window.addEventListener('DOMContentLoaded', async () => {
    const hash = window.location.hash;
    if (hash && hash.includes('error=access_denied')) {
      msgBox.className = 'msg-box msg-error';
      msgBox.textContent = '❌ リンクの期限が切れているか、無効です。もう一度リセットメールを 요청하세요.';
      submitBtn.disabled = true;
      return;
    }
    
    // [핵심] 현재 세션이 있는지 확인 (없다면 링크를 통해 들어온 토큰으로 세션 수립 시도)
    const { data: { session }, error } = await supabase.auth.getSession();
    if (error || !session) {
      console.error("Session recovery failed:", error);
      // 세션이 없으면 비밀번호 변경이 불가능하므로 경고 표시
    }
  });

  form.onsubmit = async (e) => {
    e.preventDefault();
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;

    if (password !== confirmPassword) {
      msgBox.className = 'msg-box msg-error';
      msgBox.textContent = '❌ パスワードが一致しません。';
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = '変更中...';

    // [수정] 세션이 확실히 유효한지 확인 후 업데이트
    const { error } = await supabase.auth.updateUser({
      password: password
    });

    if (error) {
      msgBox.className = 'msg-box msg-error';
      // 이미 만료된 경우 더 친절한 메시지 출력
      if (error.status === 401 || error.message.includes('expired')) {
        msgBox.textContent = '❌ 세션이 만료되었습니다. 다시 이메일 요청을 보내주세요.';
      } else {
        msgBox.textContent = '❌ エラー: ' + error.message;
      }
      submitBtn.disabled = false;
      submitBtn.textContent = 'パスワードを変更する';
    } else {
      msgBox.className = 'msg-box msg-success';
      msgBox.textContent = '✅ パスワードが正常に変更されました！';
      
      setTimeout(() => {
        window.location.href = 'auth_combo.html';
      }, 2000);
    }
  };
</script>
</body>
</html>
